<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>MCI 통합 상황판</title>

<!-- ==================== PWA 메타데이터 ==================== -->
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#dc2626" />
<link rel="icon" type="image/svg+xml" href="/icon.svg" />
<link rel="apple-touch-icon" href="/icon.svg" />
<!-- iOS: 홈 화면에 추가 시 풀스크린·앱처럼 동작 -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="MCI 상황판" />
<meta name="mobile-web-app-capable" content="yes" />
<!-- ======================================================== -->

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  body { font-family: 'Pretendard', sans-serif; background: #020617; color: #f1f5f9; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .scrollbar-thin::-webkit-scrollbar { width: 4px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  /* fade-in for status */
  .fade { animation: fade .25s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(-2px); } to { opacity: 1; transform: none; } }
  /* Placeholder를 매우 흐리게 + 이탤릭으로 - 입력값과 명확히 구분 (의료 정보 오인 방지) */
  input::placeholder, textarea::placeholder {
    color: #475569 !important;        /* slate-600, 매우 흐림 */
    font-style: italic;
    opacity: 0.7;
  }
  /* 포커스 시 placeholder 더 흐리게 */
  input:focus::placeholder, textarea:focus::placeholder {
    color: #334155 !important;        /* slate-700, 거의 안 보임 */
    opacity: 0.5;
  }
  /* 실제 입력값은 더 또렷하게 */
  input, textarea, select {
    color: #f1f5f9 !important;        /* slate-100, 매우 밝음 */
    font-weight: 500;
  }

  /* ============================================================================
     외부(야외) 모드 — 전문 라이트 테마 (Professional Light Mode)
     설계 원칙:
       1) 배경/표면 계층화: body(연회색) > card(흰색) > 보조(슬레이트). 카드가 또렷이 부각.
       2) 의미색 뱃지: 다크모드의 "옅은 색 + 투명도" 조합 → 풀채도 배경 + 강한 대비 글씨.
       3) 보더: 옅은 회색이 아닌 명확한 슬레이트 톤으로 분리감 확보.
       4) 글씨 굵기: 햇빛 시인성 위해 한 단계씩 굵게.
       5) 색-의미 매핑 유지: red=긴급/실명, amber=주의/마스킹, emerald=완료, pink=MCI, cyan=소아, sky=관찰자, purple=관리자.
     ============================================================================ */

  /* ── ① 표면(Surfaces) 계층 ── */
  body.outdoor-mode {
    background: #f1f5f9 !important;        /* slate-100 — body 연회색 (눈 편안) */
    color: #0f172a !important;             /* slate-900 — 주 텍스트 거의 검정 */
    font-weight: 500;
  }
  body.outdoor-mode .bg-slate-950 { background-color: #f8fafc !important; }   /* 최외곽 → 더 연한 회색 */
  body.outdoor-mode .bg-slate-900 { background-color: #ffffff !important; }   /* 카드 → 순백 (배경 위에서 부각) */
  body.outdoor-mode .bg-slate-800 { background-color: #e2e8f0 !important; }   /* 보조 표면 */
  body.outdoor-mode .bg-slate-700 { background-color: #cbd5e1 !important; }

  /* ── ② 텍스트 ── */
  body.outdoor-mode .text-slate-100 { color: #0f172a !important; }   /* primary */
  body.outdoor-mode .text-slate-200 { color: #1e293b !important; }
  body.outdoor-mode .text-slate-300 { color: #334155 !important; }
  body.outdoor-mode .text-slate-400 { color: #475569 !important; }   /* secondary */
  body.outdoor-mode .text-slate-500 { color: #64748b !important; }   /* tertiary */
  body.outdoor-mode .text-slate-600 { color: #94a3b8 !important; }   /* muted */
  body.outdoor-mode .text-slate-700 { color: #94a3b8 !important; }
  body.outdoor-mode strong, body.outdoor-mode .font-bold, body.outdoor-mode .font-black {
    font-weight: 800 !important;
  }

  /* ── ③ 보더 ── */
  body.outdoor-mode .border-slate-700 { border-color: #475569 !important; }   /* 강조 보더 */
  body.outdoor-mode .border-slate-800 { border-color: #cbd5e1 !important; }   /* 기본 보더 */
  body.outdoor-mode .border-slate-900 { border-color: #e2e8f0 !important; }   /* 미세 분리 */
  body.outdoor-mode .divide-slate-900 > * + * { border-color: #e2e8f0 !important; }
  body.outdoor-mode .divide-slate-800 > * + * { border-color: #cbd5e1 !important; }

  /* ── ④ 반투명 slate 변형 ── */
  body.outdoor-mode [class*="bg-slate-950/"] { background-color: rgba(248, 250, 252, 0.85) !important; }
  body.outdoor-mode [class*="bg-slate-900/"] { background-color: rgba(241, 245, 249, 0.6) !important; }
  body.outdoor-mode [class*="bg-slate-800/"] { background-color: rgba(203, 213, 225, 0.5) !important; }

  /* ── ⑤ 입력 폼 ── */
  body.outdoor-mode input, body.outdoor-mode textarea, body.outdoor-mode select {
    color: #0f172a !important;
    background-color: #ffffff !important;
    border-color: #94a3b8 !important;
    font-weight: 600;
  }
  body.outdoor-mode input::placeholder, body.outdoor-mode textarea::placeholder {
    color: #94a3b8 !important;
  }

  /* ── ⑥ 모달 백드롭 ── */
  body.outdoor-mode .bg-black\/70, body.outdoor-mode .bg-black\/80 {
    background-color: rgba(15, 23, 42, 0.5) !important;
  }

  /* ── ⑦ 강조 그라데이션 헤더 — 색별로 라이트 톤 적용 ── */
  body.outdoor-mode [class*="from-rose-950"],
  body.outdoor-mode [class*="from-pink-950"] {
    background-image: linear-gradient(to right, rgba(252, 231, 243, 0.6), transparent) !important;
  }
  body.outdoor-mode [class*="from-blue-950"] {
    background-image: linear-gradient(to right, rgba(219, 234, 254, 0.6), transparent) !important;
  }
  body.outdoor-mode [class*="from-amber-950"] {
    background-image: linear-gradient(to right, rgba(254, 243, 199, 0.6), transparent) !important;
  }
  body.outdoor-mode [class*="from-purple-950"] {
    background-image: linear-gradient(to right, rgba(243, 232, 255, 0.6), transparent) !important;
  }
  body.outdoor-mode [class*="from-emerald-950"] {
    background-image: linear-gradient(to right, rgba(209, 250, 229, 0.6), transparent) !important;
  }
  body.outdoor-mode [class*="from-rose-600"],
  body.outdoor-mode [class*="to-pink-700"] {
    /* 헤더 아이콘 배경: from-rose-600 to-pink-700 — 그대로 유지 (이미 진함) */
  }

  /* ── ⑧ 의미색 뱃지: 풀채도 솔리드 + 흰 글씨 ──
     기본 다크 모드의 "bg-COLOR-600/20 + text-COLOR-300" 옅은 조합을 풀컬러로 강제. */

  /* AMBER — 브리핑 모드 / 마스킹 / 주의 */
  body.outdoor-mode .bg-amber-500\/20,
  body.outdoor-mode .bg-amber-500\/30 {
    background-color: #f59e0b !important;
    border-color: #b45309 !important;
  }
  body.outdoor-mode .bg-amber-500\/20.text-amber-300,
  body.outdoor-mode .bg-amber-500\/20 .text-amber-300,
  body.outdoor-mode .bg-amber-500\/30 .text-amber-300 {
    color: #451a03 !important;       /* 노란 배경에는 진한 갈색이 가독성 최고 */
  }
  body.outdoor-mode .border-amber-500\/50 { border-color: #b45309 !important; }
  body.outdoor-mode .bg-amber-950\/40 {
    background-color: #fef3c7 !important;     /* 정보 패널 — 연한 호박 */
    border-color: #d97706 !important;
  }
  body.outdoor-mode .bg-amber-950\/40 .text-amber-200,
  body.outdoor-mode .bg-amber-950\/40 .text-amber-300 {
    color: #78350f !important;
  }
  body.outdoor-mode .border-amber-700\/50 { border-color: #b45309 !important; }

  /* RED — 실명 표시 / 긴급 / 위험 */
  body.outdoor-mode .bg-red-600\/20,
  body.outdoor-mode .bg-red-600\/30 {
    background-color: #dc2626 !important;
    border-color: #7f1d1d !important;
  }
  body.outdoor-mode .bg-red-600\/20.text-red-300,
  body.outdoor-mode .bg-red-600\/20 .text-red-300,
  body.outdoor-mode .bg-red-600\/30 .text-red-300 {
    color: #ffffff !important;
  }
  body.outdoor-mode .border-red-500\/50 { border-color: #7f1d1d !important; }
  body.outdoor-mode .bg-red-950\/40,
  body.outdoor-mode .bg-red-950\/50 {
    background-color: #fee2e2 !important;
    border-color: #dc2626 !important;
  }
  body.outdoor-mode .bg-red-950\/40 .text-red-200,
  body.outdoor-mode .bg-red-950\/40 .text-red-300 {
    color: #991b1b !important;
  }
  body.outdoor-mode .border-red-700\/50,
  body.outdoor-mode .border-red-800\/60 { border-color: #7f1d1d !important; }

  /* PINK — MCI 뱃지 */
  body.outdoor-mode .bg-pink-900\/60 {
    background-color: #db2777 !important;
    border-color: #831843 !important;
  }
  body.outdoor-mode .bg-pink-900\/60 .text-pink-200,
  body.outdoor-mode .bg-pink-900\/60 * {
    color: #ffffff !important;
  }
  body.outdoor-mode .border-pink-500\/50 { border-color: #831843 !important; }

  /* CYAN — 소아 표시 */
  body.outdoor-mode .bg-cyan-950\/50,
  body.outdoor-mode .bg-cyan-950\/40 {
    background-color: #cffafe !important;
    border-color: #0e7490 !important;
  }
  body.outdoor-mode .bg-cyan-950\/50 .text-cyan-300,
  body.outdoor-mode .bg-cyan-950\/40 .text-cyan-300 {
    color: #155e75 !important;
  }
  body.outdoor-mode .border-cyan-700\/50 { border-color: #0e7490 !important; }

  /* EMERALD — 도착 / 완료 / 성공 */
  body.outdoor-mode .bg-emerald-950\/40,
  body.outdoor-mode .bg-emerald-950\/50 {
    background-color: #d1fae5 !important;
    border-color: #059669 !important;
  }
  body.outdoor-mode .bg-emerald-950\/40 .text-emerald-200,
  body.outdoor-mode .bg-emerald-950\/40 .text-emerald-300 {
    color: #064e3b !important;
  }
  body.outdoor-mode .border-emerald-700\/50 { border-color: #047857 !important; }

  /* SKY — 본부 / observer */
  body.outdoor-mode .bg-sky-900\/40 {
    background-color: #e0f2fe !important;
    border-color: #0369a1 !important;
  }
  body.outdoor-mode .bg-sky-900\/40 .text-sky-300 { color: #075985 !important; }

  /* PURPLE — 관리자 */
  body.outdoor-mode .bg-purple-900\/40 {
    background-color: #f3e8ff !important;
    border-color: #6b21a8 !important;
  }
  body.outdoor-mode .bg-purple-900\/40 .text-purple-200,
  body.outdoor-mode .bg-purple-900\/40 .text-purple-300 {
    color: #581c87 !important;
  }
  body.outdoor-mode .border-purple-700\/40,
  body.outdoor-mode .border-purple-700\/50,
  body.outdoor-mode .border-purple-800\/50 { border-color: #7e22ce !important; }

  /* VIOLET — 미이송(자체귀가) */
  body.outdoor-mode .bg-violet-950\/30,
  body.outdoor-mode .bg-violet-950\/40 {
    background-color: #ede9fe !important;
    border-color: #6d28d9 !important;
  }
  body.outdoor-mode .bg-violet-950\/30 .text-violet-200,
  body.outdoor-mode .bg-violet-950\/40 .text-violet-200,
  body.outdoor-mode .bg-violet-950\/30 .text-violet-300 {
    color: #5b21b6 !important;
  }
  body.outdoor-mode .text-violet-200 { color: #5b21b6 !important; }
  body.outdoor-mode .text-violet-300 { color: #6d28d9 !important; }
  body.outdoor-mode .text-violet-400 { color: #7c3aed !important; }
  body.outdoor-mode .border-violet-500 { border-color: #6d28d9 !important; }
  body.outdoor-mode .border-violet-700\/50 { border-color: #5b21b6 !important; }

  /* ── ⑨ 단독 사용된 text-XXX-300/400 (뱃지 컨테이너 없음) — 진한 색으로 ──
     (위 ⑧ 뱃지 안 글씨는 더 specific해서 그대로 우선 적용됨) */
  body.outdoor-mode .text-amber-200 { color: #78350f !important; }
  body.outdoor-mode .text-amber-300 { color: #b45309 !important; }
  body.outdoor-mode .text-amber-400 { color: #d97706 !important; }
  body.outdoor-mode .text-red-200   { color: #991b1b !important; }
  body.outdoor-mode .text-red-300   { color: #b91c1c !important; }
  body.outdoor-mode .text-red-400   { color: #dc2626 !important; }
  body.outdoor-mode .text-pink-200  { color: #831843 !important; }
  body.outdoor-mode .text-pink-300  { color: #be185d !important; }
  body.outdoor-mode .text-cyan-300  { color: #155e75 !important; }
  body.outdoor-mode .text-cyan-400  { color: #0e7490 !important; }
  body.outdoor-mode .text-emerald-300 { color: #047857 !important; }
  body.outdoor-mode .text-emerald-400 { color: #059669 !important; }
  body.outdoor-mode .text-blue-300  { color: #1d4ed8 !important; }
  body.outdoor-mode .text-blue-400  { color: #2563eb !important; }
  body.outdoor-mode .text-purple-200 { color: #6b21a8 !important; }
  body.outdoor-mode .text-purple-300 { color: #7e22ce !important; }
  body.outdoor-mode .text-rose-300  { color: #be123c !important; }
  body.outdoor-mode .text-sky-300   { color: #0369a1 !important; }

  /* ── ⑩ 활성 탭 (text-white) 가시화 ── */
  body.outdoor-mode .mci-tab-btn.text-white,
  body.outdoor-mode .view-btn.text-white,
  body.outdoor-mode .admin-tab-btn.text-white {
    color: #0f172a !important;
    font-weight: 800;
  }

  /* ── ⑪ 트리아지 합계 카드 — 풀채도 ── */
  body.outdoor-mode .triage-card-clickable[data-triage-card="emergency"] {
    background: #dc2626 !important;
    border-color: #7f1d1d !important;
  }
  body.outdoor-mode .triage-card-clickable[data-triage-card="urgent"] {
    background: #f59e0b !important;
    border-color: #78350f !important;
  }
  body.outdoor-mode .triage-card-clickable[data-triage-card="nonurgent"] {
    background: #16a34a !important;
    border-color: #14532d !important;
  }
  body.outdoor-mode .triage-card-clickable[data-triage-card="dead"] {
    background: #475569 !important;
    border-color: #0f172a !important;
  }
  body.outdoor-mode .triage-card-clickable[data-triage-card="emergency"] > div:not(.text-cyan-300):not(.text-cyan-400),
  body.outdoor-mode .triage-card-clickable[data-triage-card="nonurgent"] > div:not(.text-cyan-300):not(.text-cyan-400),
  body.outdoor-mode .triage-card-clickable[data-triage-card="dead"] > div:not(.text-cyan-300):not(.text-cyan-400) {
    color: #ffffff !important;
  }
  body.outdoor-mode .triage-card-clickable[data-triage-card="urgent"] > div:not(.text-cyan-300):not(.text-cyan-400) {
    color: #451a03 !important;
  }
  body.outdoor-mode .triage-card-clickable { outline-color: #0f172a !important; }
  /* 트리아지 카드 안 소아 표시 — 채도 높은 배경 위라 LIGHT 톤 유지 */
  body.outdoor-mode .triage-card-clickable .text-cyan-300,
  body.outdoor-mode .triage-card-clickable .text-cyan-400 {
    color: #cffafe !important;  /* cyan-100 — 강한 색 배경에서 또렷 */
  }

  /* ── 피해 상황 카드 (일반 재난 모드) — MCI 트리아지와 동일한 외부 모드 처리 ──
     심각도별 색 매핑: 사망=회색, 중상=빨강, 경상=호박, 기타=초록 */
  body.outdoor-mode .damage-card[data-damage-type="severe"] {
    background: #dc2626 !important;
    border-color: #7f1d1d !important;
  }
  body.outdoor-mode .damage-card[data-damage-type="mild"] {
    background: #f59e0b !important;
    border-color: #78350f !important;
  }
  body.outdoor-mode .damage-card[data-damage-type="other"] {
    background: #16a34a !important;
    border-color: #14532d !important;
  }
  body.outdoor-mode .damage-card[data-damage-type="dead"] {
    background: #475569 !important;
    border-color: #0f172a !important;
  }
  /* 카드 안 inline color 오버라이드 — 풀채도 배경에 맞는 흰 글씨/진한 갈색 */
  body.outdoor-mode .damage-card[data-damage-type="severe"] > div,
  body.outdoor-mode .damage-card[data-damage-type="other"] > div,
  body.outdoor-mode .damage-card[data-damage-type="dead"] > div {
    color: #ffffff !important;
  }
  body.outdoor-mode .damage-card[data-damage-type="mild"] > div {
    color: #451a03 !important;
  }

  /* ── ⑫ 모드 전환 버튼 (일반 재난 / 다수사상자) ── */
  body.outdoor-mode .mode-btn.bg-red-600\/30 {
    background-color: #dc2626 !important;
    color: #ffffff !important;
    border-color: #7f1d1d !important;
  }
  body.outdoor-mode .mode-btn.bg-red-600\/30 i { color: #ffffff !important; }
  body.outdoor-mode .mode-btn.bg-pink-600\/30 {
    background-color: #db2777 !important;
    color: #ffffff !important;
    border-color: #831843 !important;
  }
  body.outdoor-mode .mode-btn.bg-pink-600\/30 i { color: #ffffff !important; }
  body.outdoor-mode .mode-btn.bg-slate-900 {
    background-color: #f8fafc !important;
    color: #475569 !important;
    border-color: #cbd5e1 !important;
  }
  body.outdoor-mode .mode-btn.bg-slate-900:hover {
    color: #0f172a !important;
    border-color: #94a3b8 !important;
  }

  /* ── ⑬ 모달 닫기 버튼 ── */
  body.outdoor-mode [data-mci-card-modal-close] {
    background-color: #ffffff !important;
    border: 1.5px solid #475569 !important;
    color: #0f172a !important;
    font-weight: 700 !important;
  }
  body.outdoor-mode [data-mci-card-modal-close]:hover {
    background-color: #e2e8f0 !important;
    border-color: #1e293b !important;
  }
  body.outdoor-mode #admin-close {
    background-color: #f1f5f9 !important;
    border: 1px solid #94a3b8 !important;
    border-radius: 8px;
    color: #0f172a !important;
  }
  body.outdoor-mode #admin-close:hover { background-color: #e2e8f0 !important; }

  /* ── ⑭ 외부 모드 토글 ── */
  body.outdoor-mode #outdoor-toggle {
    background-color: #1e293b !important;
    border-color: #334155 !important;
    color: #fbbf24 !important;
  }
  body.outdoor-mode #outdoor-toggle:hover { background-color: #334155 !important; }

  /* ── 표출(TV) 모드 — 설치 배너·외부모드 토글 숨김 (상황실 화면에 불필요) ── */
  body[data-view="display"] #install-banner,
  body[data-view="display"] #outdoor-toggle {
    display: none !important;
  }
</style>

const fmtTime = (d) => {
  if (!d) return '';
  const pad = n => String(n).padStart(2, '0');
  return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
};
const fmtHM = (d) => {
  if (!d) return '--:--';
  const pad = n => String(n).padStart(2, '0');
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
};
const escapeHtml = (str) => String(str || '').replace(/[&<>"']/g, c => ({
  '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
}[c]));

// 이름 마스킹: 한경승 → 한**, 김아 → 김*, A → *
const maskName = (name) => {
  const s = String(name || '').trim();
  if (!s) return '';
  if (s.length === 1) return '*';
  if (s.length === 2) return s[0] + '*';
  return s[0] + '*'.repeat(s.length - 1);
};
// 주증상 마스킹: 첫 3자만 + ***
const maskSymptom = (text) => {
  const s = String(text || '').trim();
  if (!s) return '';
  if (s.length <= 5) return '*'.repeat(s.length);
  return s.slice(0, 3) + '***';
};

function bindRealtime() {
  // V2 — 인덱스: 진행 중 재난 목록 (로비/관찰자/관리자 모두 사용)
  onValue(ref(db, 'incidents'), snap => {
    const v = snap.val() || {};
    state.incidents = Object.entries(v).map(([k, val]) => ({ ...val, _key: k }));
    render();
  });
  // V2 — archives (글로벌, 종료된 재난 백업)
  onValue(ref(db, 'archives'), snap => {
    const v = snap.val() || {};
    const list = Object.entries(v).map(([k, val]) => ({ ...val, _key: k }));
    list.sort((a, b) => (b.archivedAt || 0) - (a.archivedAt || 0));
    state.archives = list;
    render();
  });
  // V5 — 관서 코드: Firebase 동기화 + 비어있으면 SEED로 초기 1회 채움
  onValue(ref(db, 'config/agencyCodes'), snap => {
    const v = snap.val();
    if (!v || Object.keys(v).length === 0) {
      // 첫 부팅 / 빈 상태 → SEED 푸시 (응답이 다시 와서 채워짐)
      seedDefaultAgencyCodes();
      return;
    }
    const list = Object.entries(v).map(([k, val]) => ({ ...val, _key: k }));
    state.agencyCodesList = list;
    // 코드(로그인 문자열) → 정보 맵 재구축 (기존 호출부 호환)
    const map = {};
    list.forEach(e => {
      if (e && e.code) map[e.code] = { id: e.id, name: e.name, role: e.role };
    });
    AGENCY_CODES = map;
    render();
  });
  // 재난방별 구독은 rebindIncidentRealtime()에서 처리
  rebindIncidentRealtime();
}

// V5 — Firebase /config/agencyCodes 가 비었을 때만 SEED 푸시 (멱등)
async function seedDefaultAgencyCodes() {
  try {
    const r = await get(ref(db, 'config/agencyCodes'));
    if (r.exists() && Object.keys(r.val() || {}).length > 0) return; // 이미 채워짐
    const updates = {};
    DEFAULT_AGENCY_CODES_SEED.forEach(e => {
      const k = push(ref(db, 'config/agencyCodes')).key;
      updates[k] = e;
    });
    await set(ref(db, 'config/agencyCodes'), updates);
  } catch (e) {
    console.error('seedDefaultAgencyCodes', e);
  }
}

// V5 — 관서 코드 추가/수정
// data: { code, id, name, role }, key가 있으면 수정 (id는 immutable)
async function saveAgencyCode(key, data) {
  try {
    const code = (data.code || '').trim();
    const name = (data.name || '').trim();
    const role = data.role;
    if (!code) throw new Error('진입 코드를 입력하세요');
    if (code.length > 30) throw new Error('진입 코드는 30자 이하로 입력하세요');
    if (!name) throw new Error('표시명을 입력하세요');
    if (!['normal', 'observer', 'display', 'admin'].includes(role)) throw new Error('역할이 잘못되었습니다');

    // 코드 중복 체크 (다른 entry에 이미 같은 code가 있으면 차단)
    const dupCode = state.agencyCodesList.find(e => e.code === code && e._key !== key);
    if (dupCode) throw new Error(`이미 사용 중인 진입 코드입니다: ${code}`);

    if (key) {
      // 수정: id는 변경 불가
      const existing = state.agencyCodesList.find(e => e._key === key);
      if (!existing) throw new Error('대상 코드를 찾을 수 없습니다');
      // 마지막 admin을 다른 역할로 강등 차단
      if (existing.role === 'admin' && role !== 'admin') {
        const adminCount = state.agencyCodesList.filter(e => e.role === 'admin').length;
        if (adminCount <= 1) throw new Error('마지막 admin 코드의 역할은 변경할 수 없습니다');
      }
      await update(ref(db, `config/agencyCodes/${key}`), {
        code, id: existing.id, name, role,
      });
    } else {
      // 추가: id 검증/자동 생성
      let id = (data.id || '').trim();
      if (!id) {
        id = 'auto_' + Math.random().toString(36).slice(2, 10);
      }
      if (!/^[a-zA-Z0-9_]+$/.test(id)) throw new Error('id는 영문·숫자·언더스코어만 사용 가능합니다');
      const dupId = state.agencyCodesList.find(e => e.id === id);
      if (dupId) throw new Error(`이미 사용 중인 id입니다: ${id}`);
      const newRef = push(ref(db, 'config/agencyCodes'));
      await set(newRef, { code, id, name, role });
    }
    return { ok: true };
  } catch (e) {
    return { ok: false, reason: e.message };
  }
}

// V5 — 관서 코드 삭제 (마지막 admin은 차단)
async function deleteAgencyCode(key) {
  try {
    const target = state.agencyCodesList.find(e => e._key === key);
    if (!target) throw new Error('대상 코드를 찾을 수 없습니다');
    if (target.role === 'admin') {
      const adminCount = state.agencyCodesList.filter(e => e.role === 'admin').length;
      if (adminCount <= 1) throw new Error('마지막 admin 코드는 삭제할 수 없습니다');

    await remove(ref(db, `config/agencyCodes/${key}`));

}

// V2 — 재난방 변경 시 재구독 (currentIncidentId 기준)
function rebindIncidentRealtime() {
  // 이전 재난방 구독 해제
  _incidentUnsubFns.forEach(fn => { try { fn(); } catch {} });
  _incidentUnsubFns = [];
  if (!state.currentIncidentId) {
    // 로비/콘솔 — 재난방 데이터 비우기
    state.incident = null;
    state.damages = {};
    state.mobilizations = {};
    state.actions = [];
    state.casualties = [];
    state.mciCasualties = [];
    return;
  }
  const base = `incidents/${state.currentIncidentId}`;
  // 사고개요
  _incidentUnsubFns.push(onValue(ref(db, `${base}/incident`), snap => {
    state.incident = snap.val();
    render();
  }));
  // 피해
  _incidentUnsubFns.push(onValue(ref(db, `${base}/damages`), snap => {
    state.damages = snap.val() || {};
    render();
  }));
  // 동원
  _incidentUnsubFns.push(onValue(ref(db, `${base}/mobilizations`), snap => {
    state.mobilizations = snap.val() || {};
    render();
  }));
  // 조치사항
  _incidentUnsubFns.push(onValue(ref(db, `${base}/actions`), snap => {
    const v = snap.val() || {};
    const list = Object.entries(v).map(([k, val]) => ({ ...val, _key: k }));
    list.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
    state.actions = list;
    render();
  }));
  // 사상자 (일반)
  _incidentUnsubFns.push(onValue(ref(db, `${base}/casualties`), snap => {
    const v = snap.val() || {};
    const list = Object.entries(v).map(([k, val]) => ({ ...val, _key: k }));
    list.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
    state.casualties = list;
    render();
  }));
  // MCI 사상자
  _incidentUnsubFns.push(onValue(ref(db, `${base}/mciCasualties`), snap => {
    const v = snap.val() || {};
    const list = Object.entries(v).map(([k, val]) => ({ ...val, _key: k }));
    list.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
    state.mciCasualties = list;
    render();
  }));
}

function downloadCsv(masked = false) {

    const tr = TRIAGE.find(t => t.id === c.triage)?.name || c.triage || '';
    const ts = c.timestamp ? new Date(c.timestamp).toLocaleString('ko-KR') : '';
    rows.push([i+1, name, c.age||'', c.gender||'', tr, symptom||'', c.hospital||'', c.depart||'', c.author||'', tName, ts]);
  });
  const csv = '\uFEFF' + rows.map(r => r.map(v => {
    const s = String(v ?? '');
    return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s.replace(/"/g,'""')}"` : s;
  }).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `사상자명단_${new Date().toISOString().slice(0,10)}${masked ? '_마스킹' : ''}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ==================== 초기화 ====================
async function archiveAndReset(label) {
  const snap = buildSnapshot();
  // 데이터가 비어있으면 백업 안 함
  const hasData = snap.incident || Object.keys(snap.damages).length || Object.keys(snap.mobilizations).length
    || snap.actions.length || snap.casualties.length || snap.mciCasualties.length;

  try {
    if (hasData) {
      // 1. archives에 백업
      const archiveRef = push(ref(db, 'archives'));
      await set(archiveRef, {
        label: label || (snap.incident?.location || '미상 재난'),
        archivedAt: Date.now(),
        archivedBy: snap.exportedBy,
        data: snap,
      });
    }
    // 2. 현재 데이터 모두 삭제
    await Promise.all([
      remove(ref(db, incPath('incident'))),
      remove(ref(db, incPath('damages'))),
      remove(ref(db, incPath('mobilizations'))),
      remove(ref(db, incPath('actions'))),
      remove(ref(db, incPath('casualties'))),
      remove(ref(db, incPath('mciCasualties'))),
    ]);
    return { ok: true };
  } catch (e) {
    return { ok: false, reason: e.message };
  }
}

// ==================== 관리자 전용: 임의 재난 강제 종료 ====================
// archiveAndReset이 state.currentIncidentId 기준으로 동작하는 것과 달리,
// admin이 콘솔에서 어떤 재난방에든 들어가지 않고 직접 closedAt 마킹 + 데이터 백업·삭제까지 처리.
async function adminForceCloseIncident(incidentId, opts = {}) {
  try {
    const inc = state.incidents.find(i => i._key === incidentId);
    if (!inc) throw new Error('재난을 찾을 수 없습니다');

    const base = `incidents/${incidentId}`;
    // 1. 재난방 데이터 일괄 fetch
    const [incData, damages, mobilizations, actions, casualties, mciCasualties] = await Promise.all([
      get(ref(db, `${base}/incident`)),
      get(ref(db, `${base}/damages`)),
      get(ref(db, `${base}/mobilizations`)),
      get(ref(db, `${base}/actions`)),
      get(ref(db, `${base}/casualties`)),
      get(ref(db, `${base}/mciCasualties`)),
    ]);

    const actionsObj       = actions.val() || {};
    const casualtiesObj    = casualties.val() || {};
    const mciCasualtiesObj = mciCasualties.val() || {};

    const adminName = state.session?.agency?.name || 'admin';
    const snap = {
      incident: incData.val(),
      damages: damages.val() || {},
      mobilizations: mobilizations.val() || {},
      actions:        Object.entries(actionsObj).map(([k,v])       => ({ ...v, _key: k })),
      casualties:     Object.entries(casualtiesObj).map(([k,v])    => ({ ...v, _key: k })),
      mciCasualties:  Object.entries(mciCasualtiesObj).map(([k,v]) => ({ ...v, _key: k })),
      exportedAt: Date.now(),
      exportedBy: `관리자 강제 종료 (${adminName})`,
      // 인덱스 메타 정보 — 단독 archive에서도 재난 식별이 가능하도록
      _incidentMeta: {
        title: inc.title,
        type: inc.type,
        agencyId: inc.agencyId,
        startedAt: inc.startedAt,
      },
    };

    const hasData = snap.incident
      || Object.keys(snap.damages).length
      || Object.keys(snap.mobilizations).length
      || snap.actions.length
      || snap.casualties.length
      || snap.mciCasualties.length;

    // 2. 데이터 있으면 archives에 백업
    if (hasData) {
      const archiveRef = push(ref(db, 'archives'));
      await set(archiveRef, {
        label: `${inc.title || '제목 없음'} · 관리자 강제 종료${opts.note ? ' · ' + opts.note : ''}`,
        archivedAt: Date.now(),
        archivedBy: snap.exportedBy,
        data: snap,
        sourceIncidentId: incidentId,
      });
    }

    // 3. 인덱스에 closedAt 마킹 (로비/콘솔 목록에서 제외됨)
    await update(ref(db, base), {
      closedAt: Date.now(),
      closedBy: adminName,
    });
    // 4. 서브데이터 일괄 삭제 (저장공간 정리)
    await Promise.all([
      remove(ref(db, `${base}/incident`)),
      remove(ref(db, `${base}/damages`)),
      remove(ref(db, `${base}/mobilizations`)),
      remove(ref(db, `${base}/actions`)),
      remove(ref(db, `${base}/casualties`)),
      remove(ref(db, `${base}/mciCasualties`)),
    ]);

    return { ok: true, archived: hasData };
  } catch (e) {
    console.error('adminForceCloseIncident', e);
    return { ok: false, reason: e.message };
  }
}

function downloadArchiveExcel(archive) {
  const original = {
    incident: state.incident,
    damages: state.damages,
    mobilizations: state.mobilizations,
    actions: state.actions,
    casualties: state.casualties,
    mciCasualties: state.mciCasualties,
  };
  const d = archive.data || {};
  state.incident = d.incident || null;
  state.damages = d.damages || {};
  state.mobilizations = d.mobilizations || {};
  state.actions = d.actions || [];
  state.casualties = d.casualties || [];
  state.mciCasualties = d.mciCasualties || [];
  downloadExcel(false);
  Object.assign(state, original);
}

function setSaveStatus(key, status) {
  state.saveStatus[key] = status;
  render();
}
function clearSaveStatus(key) {
  delete state.saveStatus[key];
  render();
}

let formDrafts = {
  incident: null,
  damage: null,
  mobil: { agencies: null, vehicles: null },
  action: '',
};

function getIncidentDraft() {
  if (formDrafts.incident !== null) return formDrafts.incident;
  return state.incident || { datetime: '', location: '', target: '', structure: '', cause: '', summary: '' };
}
function getDamageDraft() {
  if (formDrafts.damage !== null) return formDrafts.damage;
  return state.damages[state.user.teamId] || { dead: '', severe: '', mild: '', etc: '', propRe: '', propMov: '', propEtc: '' };
}
function getMobilAgenciesDraft() {
  if (formDrafts.mobil.agencies !== null) return formDrafts.mobil.agencies;
  return state.mobilizations[state.user.teamId]?.agencies || {};
}
function getMobilVehiclesDraft() {
  if (formDrafts.mobil.vehicles !== null) return formDrafts.mobil.vehicles;
  return state.mobilizations[state.user.teamId]?.vehicles || {};
}

// ==================== 통합 합계 ====================
function getTotals() {
  const dt = { dead:0, severe:0, mild:0, etc:0, propRe:0, propMov:0, propEtc:0 };
  Object.values(state.damages).forEach(d => {
    dt.dead += Number(d.dead) || 0;
    dt.severe += Number(d.severe) || 0;
    dt.mild += Number(d.mild) || 0;
    dt.etc += Number(d.etc) || 0;
    dt.propRe += Number(d.propRe) || 0;
    dt.propMov += Number(d.propMov) || 0;
    dt.propEtc += Number(d.propEtc) || 0;
  });
  const casualtyTotal = dt.dead + dt.severe + dt.mild + dt.etc;

  const agency = {};
  AGENCIES.forEach(a => {
    let p = 0, v = 0;
    Object.values(state.mobilizations).forEach(m => {
      p += Number(m?.agencies?.[a.id]?.p) || 0;
      v += Number(m?.agencies?.[a.id]?.v) || 0;
    });
    agency[a.id] = { p, v };
  });
  const vehicle = {};
  VEHICLES.forEach(v => {
    let n = 0;
    Object.values(state.mobilizations).forEach(m => { n += Number(m?.vehicles?.[v.id]) || 0; });
    vehicle[v.id] = n;
  });
  const totalP = Object.values(agency).reduce((s, x) => s + x.p, 0);
  const totalV = Object.values(agency).reduce((s, x) => s + x.v, 0);

  return { dt, casualtyTotal, agency, vehicle, totalP, totalV };
}

// ==================== 렌더링 ====================
function render() {
  const root = document.getElementById('app');

  // 현재 view2를 body에 노출 → CSS에서 view별 처리 가능 (예: 표출 모드에서 설치 배너 숨김)
  document.body.dataset.view = state.view2 || 'auth';

  // 미인증 → 로그인
  if (!state.session) {
    root.innerHTML = renderAuth();
    bindAuthEvents();
    return;
  }

  // V2 뷰 분기
  if (state.view2 === 'admin') {
    root.innerHTML = renderAdminConsole();
    bindAdminConsoleEvents();
    if (window.lucide) window.lucide.createIcons();
    return;
  }
  if (state.view2 === 'observer') {
    root.innerHTML = renderObserverLobby();
    bindObserverLobbyEvents();
    if (window.lucide) window.lucide.createIcons();
    return;
  }
  if (state.view2 === 'display') {
    root.innerHTML = renderDisplayView();
    bindDisplayEvents();
    if (window.lucide) window.lucide.createIcons();
    return;
  }
  if (state.view2 === 'lobby') {
    root.innerHTML = renderLobby();
    bindLobbyEvents();
    if (window.lucide) window.lucide.createIcons();
    return;
  }

  // 재난방 진입 (view2 === 'incident') — V1 흐름
  if (!state.user) {
    root.innerHTML = renderUserSetup();
    bindUserSetupEvents();
    return;
  }

  root.innerHTML = renderMain();
  bindMainEvents();

  // lucide 아이콘 갱신
  if (window.lucide) window.lucide.createIcons();
}

function bindAuthEvents() {
  const input = document.getElementById('auth-input');
  const btn = document.getElementById('auth-btn');
  const err = document.getElementById('auth-error');
  const submit = () => {
    const raw = (input.value || '').trim();
    console.log('[V2 login] raw=', JSON.stringify(raw), 'codePoints=', [...raw].map(c => c.codePointAt(0).toString(16)).join(' '));
    const agency = findAgencyByCode(raw);
    if (agency) {
      state.session = { agencyId: agency.id, agency: agency, role: agency.role };
      state.authed = true;
      // 진입 후 기본 뷰 결정
      if      (agency.role === 'admin')    state.view2 = 'admin';
      else if (agency.role === 'observer') state.view2 = 'observer';
      else if (agency.role === 'display')  state.view2 = 'display';
      else                                 state.view2 = 'lobby';
      sessionStorage.setItem('disaster_session', JSON.stringify(state.session));
      sessionStorage.setItem('disaster_view2',   state.view2);
      sessionStorage.setItem('disaster_authed', '1');
      render();
    } else {
      err.textContent = '관서 코드가 올바르지 않습니다 (예시: 동두천119)';
      err.classList.remove('hidden');
    }
  };
  btn.onclick = submit;
  input.onkeydown = (e) => { if (e.key === 'Enter') submit(); };
  input.focus();
}

function bindUserSetupEvents() {
  document.querySelectorAll('.team-btn').forEach(btn => {
    btn.onclick = () => {
      state.tempTeamId = btn.dataset.team;
      render();
      document.getElementById('name-input')?.focus();
    };
  });
  const nameInput = document.getElementById('name-input');
  const enterBtn = document.getElementById('enter-btn');
  if (nameInput) {
    nameInput.oninput = (e) => { state.tempName = e.target.value; };
    nameInput.onkeydown = (e) => { if (e.key === 'Enter') enterBtn.click(); };
  }
  if (enterBtn) {
    enterBtn.onclick = () => {
      const name = (state.tempName || '').trim();
      if (!name) { nameInput.focus(); return; }
      state.user = { name, teamId: state.tempTeamId || 'command' };
      state.mciInputMode = defaultInputMode(state.user.teamId);
      sessionStorage.setItem('disaster_user', JSON.stringify(state.user));
      render();
    };
  }
}

// ----- 공통: 상단 헤더 -----
function renderV2Header(title, subtitle, opts = {}) {
  const sess = state.session;
  const agencyName = sess?.agency?.name || '';
  const roleBadge = sess?.role === 'admin'    ? '<span class="px-2 py-0.5 rounded bg-purple-900/40 text-purple-300 text-[10px] mono">ADMIN</span>'
                  : sess?.role === 'observer' ? '<span class="px-2 py-0.5 rounded bg-sky-900/40 text-sky-300 text-[10px] mono">OBSERVER</span>'
                  : sess?.role === 'display'  ? '<span class="px-2 py-0.5 rounded bg-rose-900/40 text-rose-300 text-[10px] mono">DISPLAY</span>'
                  :                              '<span class="px-2 py-0.5 rounded bg-emerald-900/40 text-emerald-300 text-[10px] mono">' + agencyName + '</span>';
  return `
    <div class="border-b border-slate-800 bg-slate-950/80 backdrop-blur sticky top-0 z-20">
      <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
        <div class="flex items-center gap-2">
          <h1 class="text-base font-bold tracking-tight">${title}</h1>
          ${roleBadge}
        </div>
        <div class="flex items-center gap-2">
          <span class="text-xs text-slate-500">${subtitle || ''}</span>
          <button id="v2-logout-btn" class="px-3 py-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 text-xs">로그아웃</button>
        </div>
      </div>
    </div>
  `;
}

function bindV2HeaderEvents() {
  const lo = document.getElementById('v2-logout-btn');
  if (lo) lo.onclick = () => {
    sessionStorage.removeItem('disaster_session');
    sessionStorage.removeItem('disaster_view2');
    sessionStorage.removeItem('disaster_currentIncidentId');
    sessionStorage.removeItem('disaster_authed');
    sessionStorage.removeItem('disaster_user');
    state.session = null;
    state.view2 = 'auth';
    state.authed = false;
    state.user = null;
    state.currentIncidentId = null;
    render();
  };
}

// ----- 관서 로비 (normal) -----
function renderLobby() {
  const list = state.incidents.filter(inc => inc.agencyId === state.session.agencyId && !inc.closedAt);
  const items = list.length === 0
    ? `<div class="text-center text-sm text-slate-500 py-12">진행 중인 재난이 없습니다.<br/><span class="text-xs">아래 버튼으로 새 재난을 시작하세요.</span></div>`
    : list.map(inc => `
        <button class="v2-incident-item w-full text-left bg-slate-900 hover:bg-slate-800 border border-slate-800 rounded-xl p-4 transition" data-id="${inc._key}">
          <div class="flex items-center justify-between">
            <div>
              <div class="text-sm font-bold">${escapeHtml(inc.title || '제목 없음')}</div>
              <div class="text-xs text-slate-500 mt-1">${escapeHtml(inc.type || '재난')} · 시작 ${fmtTime(new Date(inc.startedAt))}</div>
            </div>
            <i data-lucide="chevron-right" class="w-4 h-4 text-slate-500"></i>
          </div>
        </button>
      `).join('');
  return `
    ${renderV2Header(state.session.agency.name + ' 로비', '진행 중인 재난을 클릭해 합류하거나 새 재난을 시작하세요')}
    <div class="max-w-5xl mx-auto px-4 py-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-bold text-slate-400">진행 중인 재난 (${list.length})</h2>
        <button id="v2-new-incident-btn" class="px-3 py-2 rounded-lg bg-red-600 hover:bg-red-700 text-xs font-bold">+ 새 재난 시작</button>
      </div>
      <div class="space-y-3">${items}</div>
      <p class="text-[11px] text-slate-600 text-center mt-8 leading-relaxed">
        ⚠ 환자 식별정보(실명·주민번호·연락처) 입력 금지
      </p>
    </div>
  `;
}

function bindLobbyEvents() {
  bindV2HeaderEvents();
  const newBtn = document.getElementById('v2-new-incident-btn');
  if (newBtn) newBtn.onclick = () => openNewIncidentDialog();
  document.querySelectorAll('.v2-incident-item').forEach(el => {
    el.onclick = () => joinIncident(el.dataset.id);
  });
}

// ----- 본부 통합 로비 (observer) -----
function renderObserverLobby() {
  const all = state.incidents.filter(inc => !inc.closedAt);
  // 관서별 그룹화
  const byAgency = {};
  all.forEach(inc => {
    if (!byAgency[inc.agencyId]) byAgency[inc.agencyId] = [];
    byAgency[inc.agencyId].push(inc);
  });
  const groups = Object.keys(byAgency).map(aid => {
    const agencyName = Object.values(AGENCY_CODES).find(a => a.id === aid)?.name || aid;
    const items = byAgency[aid].map(inc => `
      <button class="v2-incident-item w-full text-left bg-slate-900 hover:bg-slate-800 border border-slate-800 rounded-xl p-3 transition" data-id="${inc._key}">
        <div class="flex items-center justify-between">
          <div>
            <div class="text-sm font-bold">${escapeHtml(inc.title || '제목 없음')}</div>
            <div class="text-xs text-slate-500 mt-1">${escapeHtml(inc.type || '재난')} · 시작 ${fmtTime(new Date(inc.startedAt))}</div>
          </div>
          <span class="text-[10px] text-sky-400 mono">READ-ONLY</span>
        </div>
      </button>
    `).join('');
    return `
      <div class="mb-6">
        <h3 class="text-xs font-bold text-slate-400 mb-2">${escapeHtml(agencyName)} (${byAgency[aid].length})</h3>
        <div class="space-y-2">${items}</div>
      </div>
    `;
  }).join('');
  return `
    ${renderV2Header('본부 통합 모니터링', '모든 관서의 진행 중 재난을 읽기 전용으로 봅니다')}
    <div class="max-w-5xl mx-auto px-4 py-6">
      <div class="text-sm font-bold text-slate-400 mb-4">전체 진행 중 재난 (${all.length})</div>
      ${all.length === 0 ? '<div class="text-center text-sm text-slate-500 py-12">현재 진행 중인 재난이 없습니다.</div>' : groups}
    </div>
  `;
}

function bindObserverLobbyEvents() {
  bindV2HeaderEvents();
  document.querySelectorAll('.v2-incident-item').forEach(el => {
    el.onclick = () => joinIncident(el.dataset.id);  // observer는 자동으로 읽기 전용
  });
}

// ===================================================================
// 표출(TV) 모드 — view2='display'
// 읽기 전용. 큰 글씨·고대비로 상황실 모니터/TV에 풀스크린 표출.
// 트리아지 합계 + 이송 상태 + 병원별 이송현황을 한눈에 보여주고,
// 클릭 시 해당 환자 목록·카드 상세를 큰 모달로 표시.
// ===================================================================
function renderDisplayView() {
  // 재난방 미선택 → 피커 화면
  if (!state.currentIncidentId) return renderDisplayPicker();
  // 선택된 재난방의 메인 표출 화면
  return renderDisplayMain();
}

function renderDisplayPicker() {
  const all = state.incidents.filter(inc => !inc.closedAt);
  return `
    <div class="min-h-screen bg-slate-950 text-slate-100 flex flex-col items-center justify-center px-8">
      <div class="text-center mb-12">
        <h1 class="text-6xl font-black tracking-tight mb-3">MCI 통합 상황판</h1>
        <p class="text-2xl text-slate-400">표출 모드 — 전시할 재난을 선택하세요</p>
      </div>
      <div class="w-full max-w-4xl">
        ${all.length === 0 ? `
          <div class="text-center text-2xl text-slate-500 py-20">진행 중인 재난이 없습니다.</div>
        ` : all.map(inc => {
          const agencyName = Object.values(AGENCY_CODES).find(a => a.id === inc.agencyId)?.name || inc.agencyId;
          return `
            <button class="display-pick-incident w-full text-left bg-slate-900 hover:bg-slate-800 border-2 border-slate-700 hover:border-pink-500 rounded-2xl p-6 mb-4 transition-all" data-id="${inc._key}">
              <div class="text-3xl font-bold mb-2">${escapeHtml(inc.title || '제목 없음')}</div>
              <div class="text-lg text-slate-400">
                ${escapeHtml(agencyName)} · ${escapeHtml(inc.type || '재난')} · 시작 ${fmtTime(new Date(inc.startedAt))}
              </div>
            </button>
          `;
        }).join('')}
      </div>
      <button id="display-logout-picker" class="mt-12 text-slate-500 hover:text-slate-200 text-sm">로그아웃</button>
    </div>
  `;
}

function renderDisplayMain() {
  // 인덱스(state.incidents)에서 재난 메타(title, type, agencyId, startedAt)를 우선 사용.
  // state.incident는 "사고 개요" 폼이 입력된 경우에만 값이 있어 보조로만 활용.
  const incMeta   = state.incidents.find(i => i._key === state.currentIncidentId) || {};
  const incDetail = state.incident || {};
  const inc = {
    title:     incMeta.title    || incDetail.location || '미정',
    type:      incMeta.type     || incDetail.target   || '',
    agencyId:  incMeta.agencyId,
    location:  incDetail.location || '',
    startedAt: incMeta.startedAt,
  };
  const totalCount = state.mciCasualties.length;

  // 트리아지 합계
  const triageTotals = MCI_TRIAGE.map(tr => ({
    ...tr,
    count: state.mciCasualties.filter(c => c.triage === tr.id).length,
    pediatricCount: state.mciCasualties.filter(c => c.triage === tr.id && c.isPediatric).length,
  }));

  // 이송 상태
  const notTransported = state.mciCasualties.filter(c => c.notTransported);
  const transported    = state.mciCasualties.filter(c => c.hospital && !c.notTransported);
  const pending        = state.mciCasualties.filter(c => !c.hospital && !c.notTransported && c.triage !== 'dead');
  const arrived        = state.mciCasualties.filter(c => c.arriveTime && !c.notTransported);
  const inTransit      = transported.length - arrived.length;

  // 병원별
  const hospitalMap = {};
  transported.forEach(c => {
    const h = c.hospital;
    if (!hospitalMap[h]) hospitalMap[h] = { total: 0, byTriage: {}, arrived: 0 };
    hospitalMap[h].total++;
    hospitalMap[h].byTriage[c.triage] = (hospitalMap[h].byTriage[c.triage] || 0) + 1;
    if (c.arriveTime) hospitalMap[h].arrived++;
  });
  const hospitals = Object.entries(hospitalMap)
    .map(([name, d]) => ({ name, ...d }))
    .sort((a, b) => b.total - a.total);

  return `
    <div class="min-h-screen bg-slate-950 text-slate-100 p-6 select-none">

      <!-- 헤더 -->
      <header class="flex items-center justify-between mb-6 pb-4 border-b-2 border-slate-800 gap-4">
        <!-- 좌: 로고 + 시스템 이름 -->
        <div class="flex items-center gap-4 flex-shrink-0">
          <div class="w-14 h-14 rounded-xl bg-gradient-to-br from-rose-600 to-pink-700 flex items-center justify-center shadow-lg shadow-pink-900/50">
            <i data-lucide="heart-pulse" class="w-8 h-8 text-white"></i>
          </div>
          <div>
            <div class="text-3xl font-black tracking-tight">MCI 통합 상황판</div>
            <div class="text-sm text-slate-400 tracking-widest uppercase">Mass Casualty Incident · 표출 모드</div>
          </div>
        </div>

        <!-- 중앙: "진행 중 재난" 라벨 + 재난 이름 -->
        <div class="flex-1 text-center px-4 min-w-0">
          <div class="text-xs text-pink-300/80 tracking-[0.3em] uppercase font-bold mb-1.5 flex items-center justify-center gap-2">
            <span class="w-1.5 h-1.5 rounded-full bg-pink-400 animate-pulse"></span>
            진행 중 재난
          </div>
          <div class="text-4xl font-black tracking-tight truncate">${escapeHtml(inc.title || inc.location || '미정')}</div>
        </div>

        <!-- 우: 큰 시계 + 액션 버튼 -->
        <div class="flex items-center gap-3 flex-shrink-0">
          <div class="bg-slate-950 border-2 border-emerald-700/60 rounded-2xl px-5 py-2.5 text-center shadow-lg shadow-emerald-900/20">
            <div id="display-clock" class="text-5xl font-black mono leading-none text-emerald-300 tabular-nums">--:--:--</div>
            <div id="display-date" class="text-[11px] text-slate-500 mt-1.5 tracking-widest font-medium">----</div>
          </div>
          <div class="flex flex-col gap-1.5">
            <button id="display-change-incident" class="text-xs text-slate-300 hover:text-white px-3 py-1.5 rounded-lg bg-slate-800/70 hover:bg-slate-700 flex items-center gap-1" title="다른 재난 선택">
              <i data-lucide="repeat" class="w-3.5 h-3.5"></i>재난 변경
            </button>
            <button id="display-logout" class="text-xs text-slate-400 hover:text-white px-3 py-1.5 rounded-lg bg-slate-800/70 hover:bg-slate-700 flex items-center gap-1" title="로그아웃">
              <i data-lucide="log-out" class="w-3.5 h-3.5"></i>로그아웃
            </button>
          </div>
        </div>
      </header>

      <!-- 트리아지 합계 (초대형) -->
      <section class="mb-6">
        <h2 class="mb-3 flex items-baseline gap-3">
          <div class="w-1.5 h-7 bg-pink-500 rounded-full self-center"></div>
          <span class="text-2xl font-bold">트리아지 합계</span>
          <span class="text-base text-slate-400 font-normal">— 총</span>
          <span class="text-3xl font-black mono text-pink-300 leading-none">${totalCount}</span>
          <span class="text-base text-slate-400 font-normal">명</span>
        </h2>
        <div class="grid grid-cols-4 gap-4">
          ${triageTotals.map(tr => `
            <button data-display-triage="${tr.id}" class="display-card triage-card-clickable rounded-2xl px-4 py-8 text-center transition-all cursor-pointer hover:brightness-125"
              data-triage-card="${tr.id}"
              style="background:${tr.bg}50; border:2px solid ${tr.color};">
              <div class="text-2xl font-black tracking-wider mb-2" style="color:${tr.color}">${tr.shortName}·${tr.name}</div>
              <div class="text-8xl font-black mono leading-none" style="color:${tr.color}">${tr.count}</div>
              ${tr.pediatricCount > 0 ? `
                <div class="text-base font-bold text-cyan-300 mt-3 flex items-center justify-center gap-1">
                  <i data-lucide="baby" class="w-4 h-4"></i>소아 ${tr.pediatricCount}
                </div>
              ` : '<div class="mt-3 text-base">&nbsp;</div>'}
            </button>
          `).join('')}
        </div>
      </section>

      <!-- 이송 상태 -->
      <section class="mb-6">
        <h2 class="text-2xl font-bold mb-3 flex items-center gap-2">
          <div class="w-1.5 h-7 bg-blue-500 rounded-full"></div>
          이송 상태
        </h2>
        <div class="grid grid-cols-4 gap-4">
          <button data-display-transport="pending" class="display-card rounded-2xl px-4 py-6 text-center bg-slate-900 border-2 border-amber-700/60 cursor-pointer hover:bg-slate-800 transition-colors">
            <div class="text-xl font-bold tracking-wider text-amber-300">미배정</div>
            <div class="text-7xl font-black mono mt-2 leading-none text-amber-400">${pending.length}</div>
          </button>
          <button data-display-transport="in-transit" class="display-card rounded-2xl px-4 py-6 text-center bg-slate-900 border-2 border-blue-700/60 cursor-pointer hover:bg-slate-800 transition-colors">
            <div class="text-xl font-bold tracking-wider text-blue-300">이송중</div>
            <div class="text-7xl font-black mono mt-2 leading-none text-blue-400">${inTransit}</div>
          </button>
          <button data-display-transport="arrived" class="display-card rounded-2xl px-4 py-6 text-center bg-slate-900 border-2 border-emerald-700/60 cursor-pointer hover:bg-slate-800 transition-colors">
            <div class="text-xl font-bold tracking-wider text-emerald-300">병원 도착</div>
            <div class="text-7xl font-black mono mt-2 leading-none text-emerald-400">${arrived.length}</div>
          </button>
          <button data-display-transport="not-transported" class="display-card rounded-2xl px-4 py-6 text-center bg-slate-900 border-2 border-violet-700/60 cursor-pointer hover:bg-slate-800 transition-colors">
            <div class="text-xl font-bold tracking-wider text-violet-300">미이송</div>
            <div class="text-7xl font-black mono mt-2 leading-none text-violet-400">${notTransported.length}</div>
          </button>
        </div>
      </section>

      <!-- 병원별 이송 현황 -->
      <section class="mb-6">
        <h2 class="text-2xl font-bold mb-3 flex items-center gap-2">
          <div class="w-1.5 h-7 bg-blue-500 rounded-full"></div>
          병원별 이송 현황
          <span class="ml-auto text-base text-slate-400 font-normal">${hospitals.length}개 병원</span>
        </h2>
        ${hospitals.length === 0 ? `
          <div class="bg-slate-900 border-2 border-slate-800 rounded-2xl p-12 text-center text-2xl text-slate-500">아직 이송된 환자가 없습니다</div>
        ` : `
          <div class="grid grid-cols-2 lg:grid-cols-3 gap-4">
            ${hospitals.map(h => `
              <button data-display-hospital="${escapeHtml(h.name)}" class="display-card text-left rounded-2xl p-5 bg-slate-900 hover:bg-slate-800 border-2 border-slate-700 hover:border-blue-500 transition-all cursor-pointer">
                <div class="text-xl font-bold mb-2 truncate" title="${escapeHtml(h.name)}">${escapeHtml(h.name)}</div>
                <div class="flex items-baseline gap-2 mb-3">
                  <span class="text-5xl font-black mono">${h.total}</span>
                  <span class="text-base text-slate-400">명</span>
                  <span class="ml-auto text-base text-emerald-400 font-bold">도착 ${h.arrived}</span>
                </div>
                <div class="flex flex-wrap gap-1">
                  ${MCI_TRIAGE.map(tr => h.byTriage[tr.id] ? `
                    <span class="text-sm px-2 py-0.5 rounded font-bold" style="background:${tr.bg};color:${tr.color}">
                      ${tr.shortName} ${h.byTriage[tr.id]}
                    </span>
                  ` : '').join('')}
                </div>
              </button>
            `).join('')}
          </div>
        `}
      </section>

      <!-- 푸터 -->
      <footer class="text-center text-sm text-slate-600 mt-8">
        실시간 동기화 · 카드를 클릭하면 상세 환자 정보를 확인할 수 있습니다.
      </footer>

      <!-- 드릴다운 모달 -->
      ${state.displayModal ? renderDisplayModal() : ''}
    </div>
  `;
}

// 표출 모드 드릴다운 모달 — 트리아지/이송상태/병원별 클릭 시 환자 목록 또는 카드 상세
function renderDisplayModal() {
  const m = state.displayModal;
  if (!m) return '';

  // 환자 카드 상세
  if (m.type === 'patient') {
    const c = state.mciCasualties.find(x => x._key === m.value);
    if (!c) { state.displayModal = null; return ''; }
    return renderDisplayPatientCard(c);
  }

  // 환자 목록 (트리아지/이송상태/병원)
  let title = '', subtitle = '', color = '#94a3b8', patients = [];
  if (m.type === 'triage') {
    const tr = MCI_TRIAGE.find(t => t.id === m.value);
    if (!tr) { state.displayModal = null; return ''; }
    title = `${tr.shortName} · ${tr.name}`;
    color = tr.color;
    patients = state.mciCasualties.filter(c => c.triage === m.value)
      .sort((a, b) => (a.cardNo || 0) - (b.cardNo || 0));
  } else if (m.type === 'transport') {
    if (m.value === 'pending') {
      title = '미배정'; color = '#f59e0b';
      patients = state.mciCasualties.filter(c => !c.hospital && !c.notTransported && c.triage !== 'dead');
    } else if (m.value === 'in-transit') {
      title = '이송중'; color = '#60a5fa';
      patients = state.mciCasualties.filter(c => c.hospital && !c.arriveTime && !c.notTransported);
    } else if (m.value === 'arrived') {
      title = '병원 도착'; color = '#34d399';
      patients = state.mciCasualties.filter(c => c.arriveTime && !c.notTransported);
    } else if (m.value === 'not-transported') {
      title = '미이송'; color = '#a78bfa';
      patients = state.mciCasualties.filter(c => c.notTransported);
    }
    const triageOrder = { emergency: 0, urgent: 1, nonurgent: 2, dead: 3 };
    patients = patients.sort((a, b) => {
      const oa = triageOrder[a.triage] ?? 9, ob = triageOrder[b.triage] ?? 9;
      if (oa !== ob) return oa - ob;
      return (a.cardNo || 0) - (b.cardNo || 0);
    });
  } else if (m.type === 'hospital') {
    title = m.value; color = '#60a5fa';
    subtitle = '이송 환자 목록';
    const triageOrder = { emergency: 0, urgent: 1, nonurgent: 2, dead: 3 };
    patients = state.mciCasualties.filter(c => c.hospital === m.value)
      .sort((a, b) => {
        const oa = triageOrder[a.triage] ?? 9, ob = triageOrder[b.triage] ?? 9;
        if (oa !== ob) return oa - ob;
        return (a.cardNo || 0) - (b.cardNo || 0);
      });
  }

  return `
    <div id="display-modal-bg" class="fixed inset-0 z-50 bg-black/85 backdrop-blur-sm flex items-center justify-center p-6">
      <div class="bg-slate-900 border-2 rounded-3xl w-full max-w-6xl max-h-[92vh] flex flex-col shadow-2xl" style="border-color:${color}">
        <div class="px-6 py-4 border-b-2 border-slate-800 flex items-center gap-4">
          <div class="px-3 py-1 rounded-lg font-black text-lg" style="background:${color}30;color:${color}">${escapeHtml(title)}</div>

// 표출 모드 이벤트 바인딩 — picker / main / modal
function bindDisplayEvents() {
  // 로그아웃 (picker · main 공통)
  ['display-logout', 'display-logout-picker'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.onclick = () => {
      sessionStorage.removeItem('disaster_session');
      sessionStorage.removeItem('disaster_view2');
      sessionStorage.removeItem('disaster_currentIncidentId');
      state.session = null;
      state.view2 = 'auth';
      state.currentIncidentId = null;
      rebindIncidentRealtime();
      render();
    };
  });

  // picker — 재난 선택
  document.querySelectorAll('.display-pick-incident').forEach(btn => {
    btn.onclick = () => {
      state.currentIncidentId = btn.dataset.id;
      sessionStorage.setItem('disaster_currentIncidentId', btn.dataset.id);
      rebindIncidentRealtime();
      render();
    };
  });

  // main — 재난 변경 (picker로 복귀)
  const changeBtn = document.getElementById('display-change-incident');
  if (changeBtn) changeBtn.onclick = () => {
    state.currentIncidentId = null;
    state.displayModal = null;
    sessionStorage.removeItem('disaster_currentIncidentId');
    rebindIncidentRealtime();
    render();
  };

  // 트리아지 카드 → 환자 목록 모달
  document.querySelectorAll('[data-display-triage]').forEach(btn => {
    btn.onclick = () => {
      state.displayModal = { type: 'triage', value: btn.dataset.displayTriage };
      render();
    };
  });

  // 이송 상태 카드 → 환자 목록 모달
  document.querySelectorAll('[data-display-transport]').forEach(btn => {
    btn.onclick = () => {
      state.displayModal = { type: 'transport', value: btn.dataset.displayTransport };
      render();
    };
  });

  // 병원 카드 → 환자 목록 모달
  document.querySelectorAll('[data-display-hospital]').forEach(btn => {
    btn.onclick = () => {
      state.displayModal = { type: 'hospital', value: btn.dataset.displayHospital };
      render();
    };
  });

  // 환자 목록 행 → 카드 상세
  document.querySelectorAll('[data-display-patient]').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      state.displayModal = { type: 'patient', value: btn.dataset.displayPatient };
      render();
    };
  });

  // 모달 닫기 (X / 배경)
  const closeBtn = document.getElementById('display-modal-close');
  if (closeBtn) closeBtn.onclick = () => { state.displayModal = null; render(); };
  const bg = document.getElementById('display-modal-bg');
  if (bg) bg.onclick = (e) => { if (e.target.id === 'display-modal-bg') { state.displayModal = null; render(); } };

  // 시계 (1초마다 갱신)
  startDisplayClock();
}

// 표출 모드 시계 — 한 인스턴스만 동작하도록 관리
let _displayClockTimer = null;
function startDisplayClock() {
  if (_displayClockTimer) clearInterval(_displayClockTimer);
  const tick = () => {
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    const clockEl = document.getElementById('display-clock');
    const dateEl = document.getElementById('display-date');
    if (clockEl) clockEl.textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    if (dateEl) {
      const weekdays = ['일','월','화','수','목','금','토'];
      dateEl.textContent = `${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())} (${weekdays[now.getDay()]})`;
    }
    // 표출 모드 벗어났으면 정지
    if (state.view2 !== 'display') {
      clearInterval(_displayClockTimer);
      _displayClockTimer = null;
    }
  };
  tick();
  _displayClockTimer = setInterval(tick, 1000);
}

// ----- 관리자 콘솔 — 관서 코드 관리 패널 (CRUD) -----
function renderAdminAgencyCodesPanel() {
  const list = [...state.agencyCodesList].sort((a, b) => {
    // admin → observer → display → normal 순 + 가나다순
    const order = { admin: 0, observer: 1, display: 2, normal: 3 };
    const oa = order[a.role] ?? 9, ob = order[b.role] ?? 9;
    if (oa !== ob) return oa - ob;
    return (a.name || '').localeCompare(b.name || '', 'ko');
  });
  const adminCount = list.filter(e => e.role === 'admin').length;
  const isAddOpen  = !!state.adminCodeAddOpen;

  return `
    <div class="bg-slate-900 border border-purple-800/50 rounded-xl p-4">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-sm font-bold text-purple-300 flex items-center gap-2">
          <i data-lucide="key-round" class="w-4 h-4"></i>관서 코드 관리 (${list.length})
        </h2>
        <button id="admin-code-add-toggle" class="text-[11px] px-2.5 py-1 rounded font-bold ${
          isAddOpen ? 'bg-slate-700 text-slate-300 hover:bg-slate-600' : 'bg-purple-600 hover:bg-purple-700 text-white'
        }">
          ${isAddOpen ? '✕ 취소' : '+ 코드 추가'}
        </button>
      </div>

      ${isAddOpen ? `
        <div class="bg-slate-950 border border-purple-700/50 rounded-lg p-3 mb-3">
          <div class="text-[10px] tracking-wider uppercase text-purple-300 mb-2">새 관서 코드 추가</div>
          <div class="grid grid-cols-1 sm:grid-cols-[1fr_1fr_1fr_130px] gap-2 mb-2">
            <input id="admin-code-add-code" type="text" placeholder="진입 코드 (예: 강남119)"
              class="bg-slate-900 border border-slate-800 rounded-md px-2.5 py-1.5 text-xs focus:outline-none focus:border-purple-500" />
            <input id="admin-code-add-name" type="text" placeholder="표시명 (예: 강남)"
              class="bg-slate-900 border border-slate-800 rounded-md px-2.5 py-1.5 text-xs focus:outline-none focus:border-purple-500" />
            <input id="admin-code-add-id" type="text" placeholder="id (선택, 영문/숫자)"
              class="bg-slate-900 border border-slate-800 rounded-md px-2.5 py-1.5 text-xs mono focus:outline-none focus:border-purple-500" />
            <select id="admin-code-add-role" class="bg-slate-900 border border-slate-800 rounded-md px-2 py-1.5 text-xs">
              <option value="normal">normal · 일반관서</option>
              <option value="observer">observer · 읽기전용</option>
              <option value="display">display · TV 표출</option>
              <option value="admin">admin · 전권</option>
            </select>
          </div>
          <div class="flex items-center justify-between">
            <div class="text-[10px] text-slate-500 leading-relaxed">
              id를 비우면 <span class="mono text-slate-400">auto_xxxxxx</span> 형식으로 자동 생성됩니다. id는 생성 후 변경 불가.
            </div>
            <button id="admin-code-add-save" class="px-4 py-1.5 rounded-lg bg-purple-600 hover:bg-purple-700 text-xs font-bold flex items-center gap-1">
              <i data-lucide="plus" class="w-3.5 h-3.5"></i>저장
            </button>
          </div>
          <div id="admin-code-add-result" class="text-[11px] mt-2 min-h-[14px]"></div>
        </div>
      ` : ''}

      <div class="space-y-1.5">
        ${list.length === 0 ? `
          <div class="text-xs text-slate-500 py-4 text-center">관서 코드가 없습니다. 위 "+ 코드 추가"로 추가하세요.</div>
        ` : list.map(e => {
          const isEditing   = state.adminCodeEditKey === e._key;
          const isLastAdmin = e.role === 'admin' && adminCount <= 1;
          const roleColor =
              e.role === 'admin'    ? 'bg-purple-900/40 text-purple-200 border-purple-700/50'
            : e.role === 'observer' ? 'bg-sky-900/40 text-sky-200 border-sky-700/50'
            : e.role === 'display'  ? 'bg-rose-900/40 text-rose-200 border-rose-700/50'
            :                          'bg-emerald-900/40 text-emerald-200 border-emerald-700/50';

          return isEditing ? `
            <div class="bg-slate-950 border border-amber-700/50 rounded-lg p-2.5">
              <div class="text-[10px] tracking-wider uppercase text-amber-400 mb-2">코드 수정 중</div>
              <div class="grid grid-cols-1 sm:grid-cols-[1fr_1fr_130px_auto] gap-2 mb-2">
                <input data-edit-code class="bg-slate-900 border border-slate-800 rounded-md px-2 py-1 text-xs focus:outline-none focus:border-amber-500" value="${escapeHtml(e.code || '')}" placeholder="진입 코드" />
                <input data-edit-name class="bg-slate-900 border border-slate-800 rounded-md px-2 py-1 text-xs focus:outline-none focus:border-amber-500" value="${escapeHtml(e.name || '')}" placeholder="표시명" />
                <select data-edit-role class="bg-slate-900 border border-slate-800 rounded-md px-2 py-1 text-xs">
                  <option value="normal"   ${e.role === 'normal'   ? 'selected' : ''}>normal</option>
                  <option value="observer" ${e.role === 'observer' ? 'selected' : ''}>observer</option>
                  <option value="display"  ${e.role === 'display'  ? 'selected' : ''}>display</option>

                </select>
                <div class="flex gap-1">
                  <button data-code-save="${e._key}" class="code-save-btn px-3 py-1 rounded-md bg-emerald-700 hover:bg-emerald-600 text-xs font-bold">저장</button>
                  <button class="code-cancel-btn px-3 py-1 rounded-md bg-slate-800 hover:bg-slate-700 text-xs">취소</button>
                </div>
              </div>
              <div class="flex items-center gap-3 text-[10px] text-slate-500">
                <span>id: <span class="mono text-slate-400">${escapeHtml(e.id || '')}</span> <span class="text-slate-600">(고정)</span></span>
                ${isLastAdmin ? '<span class="text-amber-400">마지막 admin — 역할 변경 불가</span>' : ''}
              </div>
              <div data-edit-result="${e._key}" class="text-[11px] mt-1.5 min-h-[14px]"></div>
            </div>
          ` : `
            <div class="flex items-center gap-2 bg-slate-950 border border-slate-800 rounded-lg p-2.5">
              <span class="mono text-sm text-slate-100 font-bold flex-shrink-0">${escapeHtml(e.code || '')}</span>
              <span class="text-slate-700">·</span>
              <span class="text-sm text-slate-300 truncate">${escapeHtml(e.name || '')}</span>
              <span class="text-[10px] px-1.5 py-0.5 rounded mono border font-bold ${roleColor}">${e.role}</span>
              <span class="text-[10px] text-slate-600 mono ml-1 truncate">id:${escapeHtml(e.id || '')}</span>
              <button data-code-edit="${e._key}" class="code-edit-btn ml-auto text-slate-500 hover:text-amber-400 p-1 flex-shrink-0" title="수정">
                <i data-lucide="pencil" class="w-3.5 h-3.5"></i>
              </button>
              ${isLastAdmin ? `
                <span class="text-slate-700 p-1 flex-shrink-0" title="마지막 admin 코드는 삭제할 수 없습니다">
                  <i data-lucide="lock" class="w-3.5 h-3.5"></i>
                </span>
              ` : `
                <button data-code-del="${e._key}" data-code-label="${escapeHtml(e.code || '')}" class="code-del-btn text-slate-600 hover:text-red-400 p-1 flex-shrink-0" title="삭제">
                  <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                </button>
              `}
            </div>
          `;
        }).join('')}
      </div>
      <div id="admin-code-result" class="text-[11px] mt-2 min-h-[14px]"></div>

      <div class="text-[10px] text-slate-500 mt-3 pt-2 border-t border-slate-800 leading-relaxed">
        <i data-lucide="info" class="w-3 h-3 inline mr-0.5 text-slate-600"></i>
        진입 코드를 변경하면 해당 관서의 신규 로그인부터 적용됩니다. 이미 로그인된 세션은 영향받지 않습니다.<br>
        id를 변경하지 않는 한, 기존 재난 데이터(소속 관서)는 안전하게 유지됩니다.
      </div>
    </div>
  `;
}

function bindAdminConsoleEvents() {
  bindV2HeaderEvents();

  // 재난방 진입 (본문 영역 클릭)
  document.querySelectorAll('.v2-incident-item').forEach(el => {
    el.onclick = () => joinIncident(el.dataset.id);  // admin은 전권으로 진입
  });

  // 새 재난 시작 (관서 선택 + 제목 + 종류 → admin 명의로 생성, 자동 합류 X)
  const createBtn = document.getElementById('admin-create-incident');
  if (createBtn) {
    const titleInput  = document.getElementById('admin-new-title');
    const typeInput   = document.getElementById('admin-new-type');
    const agencySel   = document.getElementById('admin-new-agency');
    const resultEl    = document.getElementById('admin-create-result');

    const doCreate = async () => {
      const title = (titleInput?.value || '').trim();
      const type  = (typeInput?.value || '').trim() || '재난';
      const agencyId = agencySel?.value || '';
      if (!title) {
        resultEl.innerHTML = '<span class="text-red-400">재난 제목을 입력하세요.</span>';
        titleInput?.focus();
        return;
      }
      if (!agencyId) {
        resultEl.innerHTML = '<span class="text-red-400">관서를 선택하세요.</span>';
        return;
      }
      const agencyName = Object.values(AGENCY_CODES).find(a => a.id === agencyId)?.name || agencyId;
      resultEl.innerHTML = '<span class="text-amber-400">생성 중...</span>';
      const ok = await createIncident(title, type, {
        agencyId,
        createdBy: `${agencyName} (관리자 대행)`,
        noJoin: true,
      });
      if (ok) {
        resultEl.innerHTML = `<span class="text-emerald-400">✓ "${escapeHtml(title)}" 재난이 ${escapeHtml(agencyName)} 소속으로 생성되었습니다.</span>`;
        if (titleInput) titleInput.value = '';
        // typeInput, agencySel은 다음 생성도 같은 값일 가능성 높아 유지
        setTimeout(() => { if (resultEl) resultEl.innerHTML = ''; }, 4000);
      } else {
        resultEl.innerHTML = '<span class="text-red-400">생성 실패. 콘솔 로그를 확인하세요.</span>';
      }
    };
    createBtn.onclick = doCreate;
    if (titleInput) titleInput.onkeydown = (e) => { if (e.key === 'Enter') doCreate(); };
  }

  // 백업 이력 — 엑셀 다운로드
  document.querySelectorAll('.dl-archive').forEach(btn => {
    btn.onclick = () => {
      const ar = state.archives.find(a => a._key === btn.dataset.dlArchive);
      if (ar) downloadArchiveExcel(ar);
    };
  });
  // 백업 이력 — 삭제
  document.querySelectorAll('.del-archive').forEach(btn => {
    btn.onclick = async () => {
      if (!confirm('이 백업 이력을 삭제하시겠습니까?\n삭제 후에는 복구할 수 없습니다.')) return;
      await deleteArchive(btn.dataset.delArchive);
    };
  });

  // 재난 강제 종료 (각 행의 [종료] 버튼)
  document.querySelectorAll('.admin-force-close').forEach(btn => {
    btn.onclick = async () => {
      const id    = btn.dataset.id;
      const title = btn.dataset.title || '제목 없음';
      const resultEl = document.getElementById('admin-close-result');
      if (!confirm(`"${title}" 재난을 강제 종료하시겠습니까?\n\n· 현재 데이터(사고개요·피해·동원·사상자·조치사항)는 자동으로 archives에 백업됩니다.\n· 종료 후 일반 사용자에게는 더 이상 보이지 않습니다.\n· 이 작업은 되돌릴 수 없습니다.`)) return;
      btn.disabled = true;
      btn.innerHTML = '<i data-lucide="loader-2" class="w-3.5 h-3.5 animate-spin"></i>종료 중...';
      if (window.lucide) window.lucide.createIcons();
      if (resultEl) resultEl.innerHTML = '<span class="text-amber-400">강제 종료 처리 중...</span>';
      const r = await adminForceCloseIncident(id);
      if (r.ok) {
        if (resultEl) resultEl.innerHTML = `<span class="text-emerald-400">✓ "${escapeHtml(title)}" 종료 완료${r.archived ? ' (백업됨)' : ' (데이터 없음 — 백업 생략)'}</span>`;
        setTimeout(() => { if (resultEl) resultEl.innerHTML = ''; }, 4000);
        // state.incidents는 Firebase 구독으로 자동 갱신 → render() 자동 호출
      } else {
        btn.disabled = false;
        btn.innerHTML = '<i data-lucide="square-x" class="w-3.5 h-3.5"></i>종료';
        if (window.lucide) window.lucide.createIcons();
        if (resultEl) resultEl.innerHTML = `<span class="text-red-400">실패: ${escapeHtml(r.reason || '알 수 없는 오류')}</span>`;
      }
    };
  });

  // 관서 코드 관리 — 이벤트 바인딩
  bindAdminAgencyCodesEvents();
}

// ----- 관리자 콘솔 — 관서 코드 관리 이벤트 바인딩 -----
function bindAdminAgencyCodesEvents() {
  // 코드 추가 폼 토글
  const toggleBtn = document.getElementById('admin-code-add-toggle');
  if (toggleBtn) {
    toggleBtn.onclick = () => {
      state.adminCodeAddOpen = !state.adminCodeAddOpen;
      // 추가 폼이 열릴 때 다른 인라인 수정도 중단
      if (state.adminCodeAddOpen) state.adminCodeEditKey = null;
      render();
    };
  }

  // 코드 추가 — 저장
  const addSave = document.getElementById('admin-code-add-save');
  if (addSave) {
    addSave.onclick = async () => {
      const codeEl = document.getElementById('admin-code-add-code');
      const nameEl = document.getElementById('admin-code-add-name');
      const idEl   = document.getElementById('admin-code-add-id');
      const roleEl = document.getElementById('admin-code-add-role');
      const result = document.getElementById('admin-code-add-result');
      const payload = {
        code: codeEl?.value || '',
        name: nameEl?.value || '',
        id:   idEl?.value || '',
        role: roleEl?.value || 'normal',
      };
      if (result) result.innerHTML = '<span class="text-amber-400">저장 중...</span>';
      const r = await saveAgencyCode(null, payload);
      if (r.ok) {
        if (result) result.innerHTML = `<span class="text-emerald-400">✓ "${escapeHtml(payload.code)}" 추가 완료</span>`;
        // 입력값 비우기 + 폼 닫기는 사용자 선택 — 일단 입력만 비움
        if (codeEl) codeEl.value = '';
        if (nameEl) nameEl.value = '';
        if (idEl)   idEl.value = '';
        setTimeout(() => { if (result) result.innerHTML = ''; }, 3000);
      } else {
        if (result) result.innerHTML = `<span class="text-red-400">실패: ${escapeHtml(r.reason || '알 수 없는 오류')}</span>`;
      }
    };
  }

  // 코드 수정 — 진입
  document.querySelectorAll('.code-edit-btn').forEach(btn => {
    btn.onclick = () => {
      state.adminCodeEditKey = btn.dataset.codeEdit;
      state.adminCodeAddOpen = false;
      render();
    };
  });

  // 코드 수정 — 취소
  document.querySelectorAll('.code-cancel-btn').forEach(btn => {
    btn.onclick = () => {
      state.adminCodeEditKey = null;
      render();
    };
  });

  // 코드 수정 — 저장
  document.querySelectorAll('.code-save-btn').forEach(btn => {
    btn.onclick = async () => {
      const key = btn.dataset.codeSave;
      const row = btn.closest('.bg-slate-950');
      if (!row) return;
      const codeEl = row.querySelector('[data-edit-code]');
      const nameEl = row.querySelector('[data-edit-name]');
      const roleEl = row.querySelector('[data-edit-role]');
      const result = row.querySelector(`[data-edit-result="${key}"]`);
      const payload = {
        code: codeEl?.value || '',
        name: nameEl?.value || '',
        role: roleEl?.value || 'normal',
      };
      if (result) result.innerHTML = '<span class="text-amber-400">저장 중...</span>';
      const r = await saveAgencyCode(key, payload);
      if (r.ok) {
        // 수정 완료 → 인라인 폼 닫기 (Firebase 구독으로 자동 갱신됨)
        state.adminCodeEditKey = null;
        render();
      } else {
        if (result) result.innerHTML = `<span class="text-red-400">실패: ${escapeHtml(r.reason || '알 수 없는 오류')}</span>`;
      }
    };
  });

  // 코드 삭제
  document.querySelectorAll('.code-del-btn').forEach(btn => {
    btn.onclick = async () => {
      const key   = btn.dataset.codeDel;
      const label = btn.dataset.codeLabel || '';
      const result = document.getElementById('admin-code-result');
      if (!confirm(`관서 코드 "${label}" 을(를) 삭제하시겠습니까?\n\n· 해당 코드로는 더 이상 로그인할 수 없습니다.\n· 이미 진행 중인 재난(소속 관서 id 참조)은 안전하게 유지됩니다.\n· 이 작업은 되돌릴 수 없습니다.`)) return;
      if (result) result.innerHTML = '<span class="text-amber-400">삭제 중...</span>';
      const r = await deleteAgencyCode(key);
      if (r.ok) {
        if (result) result.innerHTML = `<span class="text-emerald-400">✓ "${escapeHtml(label)}" 삭제 완료</span>`;
        setTimeout(() => { if (result) result.innerHTML = ''; }, 3000);
      } else {
        if (result) result.innerHTML = `<span class="text-red-400">실패: ${escapeHtml(r.reason || '알 수 없는 오류')}</span>`;
      }
    };
  });
}

// ==================== V2 — 재난 생성/합류/이탈 ====================

// 새 재난 시작 다이얼로그 (간단 prompt)
async function openNewIncidentDialog() {
  const title = (prompt('재난 제목을 입력하세요 (예: ○○아파트 화재)', '') || '').trim();
  if (!title) return;
  const type = (prompt('재난 종류를 입력하세요 (예: 화재 / 구조 / 구급 / 교통사고 / 산불 등)', '화재') || '').trim() || '재난';
  const ok = await createIncident(title, type);
  if (!ok) alert('재난 생성 실패');
}

// Firebase에 새 재난 생성, 자동 합류
// opts.agencyId : 명시적 관서 ID 지정 (없으면 현재 세션 관서)  ← 관리자가 타관서 대행 생성 시 사용
// opts.noJoin   : true면 합류하지 않음 (관리자가 콘솔에서 다수 생성 시 사용)
async function createIncident(title, type, opts = {}) {
  try {
    const newRef = push(ref(db, 'incidents'));
    const incidentId = newRef.key;
    const data = {
      agencyId: opts.agencyId || state.session.agencyId,
      title: title,
      type: type,
      startedAt: Date.now(),
      lastActivityAt: Date.now(),
      createdBy: opts.createdBy || state.session.agency.name,
      closedAt: null,
    };
    await set(newRef, data);
    if (!opts.noJoin) joinIncident(incidentId);
    return true;
  } catch (e) {
    console.error('createIncident', e);
    return false;
  }
}

// 재난방 합류
function joinIncident(incidentId) {
  state.currentIncidentId = incidentId;
  state.view2 = 'incident';
  state.user = null;  // 직책 다시 선택 (재난방마다)
  sessionStorage.setItem('disaster_currentIncidentId', incidentId);
  sessionStorage.setItem('disaster_view2', 'incident');
  sessionStorage.removeItem('disaster_user');
  // 새 재난 경로로 Firebase 재구독은 bindRealtime 재호출에서 처리
  rebindIncidentRealtime();
  render();
}

// 재난방 이탈 → 로비/콘솔로
function leaveIncident() {
  state.currentIncidentId = null;
  state.user = null;
  // 진입 시점의 view2로 복원
  state.view2 = state.session.role === 'admin' ? 'admin'
              : state.session.role === 'observer' ? 'observer'
              : 'lobby';
  sessionStorage.removeItem('disaster_currentIncidentId');
  sessionStorage.removeItem('disaster_user');
  sessionStorage.setItem('disaster_view2', state.view2);
  rebindIncidentRealtime();
  render();
}

      </button>
      <div id="reset-result" class="text-xs text-center min-h-[20px]"></div>
