}

function bindMainEvents() {
  document.getElementById('logout-btn').onclick = () => {
    // V2: 재난방 나가기 → 로비로 (세션은 유지)
    formDrafts = { incident: null, damage: null, mobil: { agencies: null, vehicles: null }, action: '' };
    leaveIncident();
  };
  document.getElementById('admin-btn').onclick = () => {
    state.adminModal = true;
    state.adminTab = 'export';
    render();
  };
  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.onclick = () => { state.view = btn.dataset.view; render(); };
  });
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.onclick = () => {
      const newMode = btn.dataset.mode;
      if (newMode === state.mode) return;
      state.mode = newMode;
      // 모드 전환 시 적절한 초기 탭 설정
      if (newMode === 'general') {
        state.view = 'dashboard';
      } else {
        state.mciTab = 'situation';
      }
      render();
    };
  });
  document.querySelectorAll('.mci-tab-btn').forEach(btn => {
    btn.onclick = () => { state.mciTab = btn.dataset.mciTab; render(); };
  });
  const bt = document.getElementById('briefing-toggle');
  if (bt) {
    bt.onclick = () => {
      if (state.briefingMode) {
        if (!confirm('⚠ 실명 표시 모드로 전환합니다.\n\n언론·일반인이 화면을 볼 수 없는 상태인지 반드시 확인하세요.\n계속하시겠습니까?')) return;
      }
      state.briefingMode = !state.briefingMode;
      render();
    };
  }

  // 관리 모달 이벤트
  if (state.adminModal) bindAdminModalEvents();

  if (state.mode === 'general' && state.view === 'input') bindInputEvents();
  if (state.mode === 'mci' && state.mciTab === 'casualty') bindMciCasualtyEvents();
  if (state.mode === 'mci' && state.mciTab === 'situation') bindMciSituationEvents();
  if (state.viewMciCardKey) bindMciCardDetailModalEvents();
}

function bindAdminModalEvents() {
  // 닫기
  const close = () => { state.adminModal = false; render(); };
  document.getElementById('admin-close').onclick = close;
  document.getElementById('admin-modal-bg').onclick = (e) => {
    if (e.target.id === 'admin-modal-bg') close();
  };

  // 탭 전환
  document.querySelectorAll('.admin-tab-btn').forEach(btn => {
    btn.onclick = () => { state.adminTab = btn.dataset.adminTab; render(); };
  });

  // 다운로드 버튼들
  const dlBtn = (id, fn) => {
    const el = document.getElementById(id);
    if (el) el.onclick = fn;
  };
  dlBtn('dl-xlsx', () => downloadExcel(false));
  dlBtn('dl-xlsx-mask', () => downloadExcel(true));
  dlBtn('dl-csv', () => downloadCsv(false));
  dlBtn('dl-csv-mask', () => downloadCsv(true));
  dlBtn('dl-json', () => downloadJson());

  // 백업 다운로드/삭제
  document.querySelectorAll('.dl-archive').forEach(btn => {
    btn.onclick = () => {
      const ar = state.archives.find(a => a._key === btn.dataset.dlArchive);
      if (ar) downloadArchiveExcel(ar);
    };
  });
  document.querySelectorAll('.del-archive').forEach(btn => {
    btn.onclick = async () => {
      if (!confirm('이 백업 이력을 삭제하시겠습니까?\n삭제 후에는 복구할 수 없습니다.')) return;
      await deleteArchive(btn.dataset.delArchive);
    };
  });

  // 초기화 실행
  const execBtn = document.getElementById('execute-reset');
  if (execBtn) {
    execBtn.onclick = async () => {
      const label = (document.getElementById('reset-label')?.value || '').trim();
      const confirmText = (document.getElementById('reset-confirm')?.value || '').trim();
      const pw = (document.getElementById('reset-pw')?.value || '').trim();
      const resultEl = document.getElementById('reset-result');

      if (confirmText !== '초기화') {
        resultEl.innerHTML = '<span class="text-red-400">"초기화" 를 정확히 입력해주세요</span>';
        return;
      }
      if (pw !== ACCESS_CODE) {
        resultEl.innerHTML = '<span class="text-red-400">접근 코드가 잘못되었습니다</span>';
        return;
      }
      if (!confirm(`정말로 현재 재난 데이터를 백업하고 초기화하시겠습니까?\n\n라벨: ${label || '(빈 값)'}\n\n이 작업은 되돌릴 수 없습니다.`)) return;

      resultEl.innerHTML = '<span class="text-amber-400">처리 중...</span>';
      const r = await archiveAndReset(label);
      if (r.ok) {
        resultEl.innerHTML = '<span class="text-emerald-400">✓ 백업 완료, 초기화되었습니다</span>';
        // 폼 임시 데이터도 초기화
        formDrafts = { incident: null, damage: null, mobil: { agencies: null, vehicles: null }, action: '' };
        casualtyDraft = { name: '', age: '', gender: '', triage: '', symptom: '', hospital: '', depart: '', _editKey: null };
        resetMciDraft();
        resetCsDraft();
        setTimeout(() => {
          state.adminModal = false;
          state.view = 'dashboard';
          render();
        }, 1500);
      } else {
        resultEl.innerHTML = `<span class="text-red-400">실패: ${escapeHtml(r.reason)}</span>`;
      }
    };
  }
}

let casualtyDraft = { name: '', age: '', gender: '', triage: '', symptom: '', hospital: '', depart: '', _editKey: null };

function bindCasualtyEvents() {
  ['name','age','symptom','hospital','depart'].forEach(k => {
    const el = document.getElementById('cs-' + k);
    if (el) {
      el.value = casualtyDraft[k] || '';
      el.oninput = (e) => { casualtyDraft[k] = e.target.value; };
    }
  });

  // 성별 토글
  document.querySelectorAll('.cs-gender').forEach(btn => {
    if (btn.dataset.gender === casualtyDraft.gender) {
      btn.classList.remove('border-slate-800', 'bg-slate-950', 'text-slate-300');
      btn.classList.add('border-red-500', 'bg-red-950/30', 'text-white');
    }
    btn.onclick = () => {
      casualtyDraft.gender = btn.dataset.gender;
      document.querySelectorAll('.cs-gender').forEach(b => {
        b.classList.remove('border-red-500', 'bg-red-950/30', 'text-white');
        b.classList.add('border-slate-800', 'bg-slate-950', 'text-slate-300');
      });
      btn.classList.remove('border-slate-800', 'bg-slate-950', 'text-slate-300');
      btn.classList.add('border-red-500', 'bg-red-950/30', 'text-white');
    };
  });

  // 트리아지 토글
  document.querySelectorAll('.cs-triage').forEach(btn => {
    if (btn.dataset.triage === casualtyDraft.triage) {
      const color = btn.dataset.color;
      btn.style.borderColor = color;
      btn.style.background = color + '20';
      btn.style.color = color;
    }
    btn.onclick = () => {
      casualtyDraft.triage = btn.dataset.triage;
      document.querySelectorAll('.cs-triage').forEach(b => {
        b.style.borderColor = '';
        b.style.background = '';
        b.style.color = '';
        b.classList.add('border-slate-800', 'bg-slate-950', 'text-slate-300');
      });
      const color = btn.dataset.color;
      btn.classList.remove('border-slate-800', 'bg-slate-950', 'text-slate-300');
      btn.style.borderColor = color;
      btn.style.background = color + '20';
      btn.style.color = color;
    };
  });

  // 수정 취소
  const cancelBtn = document.getElementById('cancel-edit');
  if (cancelBtn) {
    cancelBtn.onclick = () => {
      casualtyDraft = { name: '', age: '', gender: '', triage: '', symptom: '', hospital: '', depart: '', _editKey: null };
      render();
    };
  }

  // 저장 버튼 (추가 또는 수정)
  document.getElementById('add-casualty').onclick = async () => {
    if (!casualtyDraft.name.trim()) { alert('이름을 입력하세요'); return; }
    if (!casualtyDraft.triage) { alert('트리아지를 선택하세요'); return; }
    const ok = await saveCasualty({
      name: casualtyDraft.name.trim(),
      age: (casualtyDraft.age || '').trim(),
      gender: casualtyDraft.gender,
      triage: casualtyDraft.triage,
      symptom: (casualtyDraft.symptom || '').trim(),
      hospital: (casualtyDraft.hospital || '').trim(),
      depart: casualtyDraft.depart,
    }, state.user.teamId, state.user.name, casualtyDraft._editKey);
    if (ok) {
      casualtyDraft = { name: '', age: '', gender: '', triage: '', symptom: '', hospital: '', depart: '', _editKey: null };
      render();
    }
  };

  // 수정 진입
  document.querySelectorAll('.edit-casualty').forEach(btn => {
    btn.onclick = () => {
      const key = btn.dataset.editCs;
      const c = state.casualties.find(x => x._key === key);
      if (!c) return;
      casualtyDraft = {
        name: c.name || '',
        age: c.age || '',
        gender: c.gender || '',
        triage: c.triage || '',
        symptom: c.symptom || '',
        hospital: c.hospital || '',
        depart: c.depart || '',
        _editKey: key,
      };
      render();
      // 폼 위로 스크롤
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };
  });

  // 삭제 버튼
  document.querySelectorAll('.del-casualty').forEach(btn => {
    btn.onclick = async () => {
      if (!confirm('이 사상자 정보를 삭제하시겠습니까?')) return;
      await deleteCasualty(btn.dataset.delCs);
    };
  });
}

              `;
            }).join('')}
          </div>
        </div>
      ` : ''}
    </div>
  `;
}

function bindActionEvents() {
  const ta = document.getElementById('action-content');
  if (ta) {
    ta.oninput = (e) => { formDrafts.action = e.target.value; };
  }
  document.getElementById('add-action').onclick = async () => {
    const content = (formDrafts.action || '').trim();
    if (!content) return;
    const ok = await addAction(content, state.user.teamId, state.user.name);
    if (ok) { formDrafts.action = ''; render(); }
  };
  document.querySelectorAll('.del-action').forEach(btn => {
    btn.onclick = async () => {
      if (!confirm('이 조치사항을 삭제하시겠습니까?')) return;
      await deleteAction(btn.dataset.del);
    };
  });
}

              <div class="grid grid-cols-2 gap-2">
                <div>
                  <label class="text-[10px] text-slate-500 block mb-0.5">출발시각 (24h)</label>
                  <input id="mci-departTime" type="text" inputmode="numeric" maxlength="5" pattern="[0-9]{2}:[0-9]{2}" placeholder="예) 14:35"
                    class="w-full bg-slate-950 border border-slate-800 rounded-md px-2 py-1.5 text-sm mono focus:outline-none focus:border-pink-500" />
                </div>
                <div>
                  <label class="text-[10px] text-slate-500 block mb-0.5">도착시각 (24h)</label>
                  <input id="mci-arriveTime" type="text" inputmode="numeric" maxlength="5" pattern="[0-9]{2}:[0-9]{2}" placeholder="예) 15:02"
                    class="w-full bg-slate-950 border border-slate-800 rounded-md px-2 py-1.5 text-sm mono focus:outline-none focus:border-pink-500" />
                </div>
              </div>
            </div>

            <!-- ⑪ 메모 -->
            <div>
              <label class="text-[11px] text-slate-400 block mb-1.5 tracking-wider uppercase">기타 메모</label>
              <textarea id="mci-notes" rows="2" placeholder="추가 정보 / 특이사항"
                class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-pink-500 resize-none"></textarea>
            </div>
          ` : `
            <!-- 간이 모드 안내 -->
            <div class="text-[11px] text-slate-500 text-center py-2 border-t border-slate-800">
              <i data-lucide="info" class="w-3 h-3 inline mr-0.5"></i>
              간이 모드: 트리아지·기본정보·주증상만 입력합니다.<br>
              생체징후·처치·이송은 구급팀이 풀 카드 모드에서 추가합니다.
            </div>
          `}

          <!-- 저장 -->
          <button id="mci-save-btn" class="w-full py-3 rounded-xl ${isEditing ? 'bg-amber-600 hover:bg-amber-700' : 'bg-pink-600 hover:bg-pink-700'} disabled:bg-slate-700 font-bold text-sm tracking-wide transition-all flex items-center justify-center gap-2">
            <i data-lucide="${isEditing ? 'save' : 'plus'}" class="w-4 h-4"></i>
            ${isEditing ? '카드 수정 저장' : (inputMode === 'simple' ? '빠른 카드 저장' : '사상자 카드 저장')}
          </button>
          <div class="text-xs text-center min-h-[20px]">${saveStatusBar('mciCasualty')}</div>
        </div>
      </div>

      <!-- 등록된 카드 목록 -->
      ${recentCards.length > 0 ? `
        <div class="bg-slate-900 rounded-2xl border border-slate-800 p-4">
          <h3 class="text-xs text-slate-500 tracking-wider uppercase mb-3 flex items-center justify-between">
            <span>${userIsField ? '내가 등록한 카드' : '최근 등록 카드 (전체)'}</span>
            <span class="text-slate-600 normal-case">${recentCards.length}개</span>
          </h3>
          <div class="space-y-1.5">
            ${recentCards.map(c => {
              const tr = MCI_TRIAGE.find(t => t.id === c.triage);
              const isCurrent = _draft._editKey === c._key;
              const editable = canEditCard(state.user, c);
              const isMine = c.author === state.user.name;
              const cardNo = c.cardNo ? `#${String(c.cardNo).padStart(3, '0')}` : '';
              return `
                <div class="flex items-center gap-2 p-2 rounded-lg ${isCurrent ? 'bg-amber-950/30 border border-amber-700/50' : 'bg-slate-950'}">
                  <span class="text-[9px] text-slate-600 mono w-9 flex-shrink-0">${cardNo}</span>
                  <span class="text-[10px] px-1.5 py-0.5 rounded font-black flex-shrink-0" style="background:${tr?.bg || '#1e293b'};color:${tr?.color || '#94a3b8'}">${tr?.shortName || '?'}</span>
                  <span class="text-sm font-medium ${c._autoNamed ? 'text-slate-400 italic' : ''}">${escapeHtml(c.name || '-')}</span>
                  <span class="text-xs text-slate-500">${escapeHtml(c.age || '?')}/${c.gender || '?'}</span>
                  ${c.isPediatric ? '<i data-lucide="baby" class="w-3 h-3 text-cyan-400"></i>' : ''}
                  <div class="flex-1 min-w-0 text-xs text-slate-400 truncate">
                    ${c.location ? `<span class="text-pink-300">📍${escapeHtml(c.location)}</span> · ` : ''}${escapeHtml(c.symptom || '')}
                  </div>
                  ${c.hospital ? `<span class="text-[10px] text-emerald-400 px-1 rounded bg-emerald-950/40 flex-shrink-0">${escapeHtml(c.hospital)}</span>` : ''}
                  ${!isMine ? `<span class="text-[9px] text-slate-600 truncate max-w-[60px] flex-shrink-0">${escapeHtml(c.author || '')}</span>` : ''}
                  ${editable ? `
                    <button data-mci-edit="${c._key}" class="mci-edit-btn text-slate-500 hover:text-amber-400 flex-shrink-0">
                      <i data-lucide="pencil" class="w-3.5 h-3.5"></i>
                    </button>
                    <button data-mci-del="${c._key}" class="mci-del-btn text-slate-600 hover:text-red-400 flex-shrink-0">
                      <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                    </button>
                  ` : `
                    <i data-lucide="lock" class="w-3.5 h-3.5 text-slate-700 flex-shrink-0" title="다른 사람 카드"></i>
                  `}
                </div>
              `;
            }).join('')}
          </div>
        </div>
      ` : ''}
    </div>
  `;
}

function bindMciCasualtyEvents() {
  // V2: 일반/MCI 모드 분기 (폼 통합)
  const _draft = currentCasualtyDraft();
  const _dataList = currentCasualtyList();

  // 모드 전환 토글
  const simpleBtn = document.getElementById('mci-mode-simple');
  const fullBtn = document.getElementById('mci-mode-full');
  if (simpleBtn) {
    simpleBtn.onclick = () => { state.mciInputMode = 'simple'; render(); };
  }
  if (fullBtn) {
    fullBtn.onclick = () => {
      state.mciInputMode = 'full'; render();
    };
  }

  // 텍스트/숫자 input
  ['name','age','rr','pulse','bpSys','bpDia','spo2','symptom','drugs','hospital','departTime','arriveTime','notes','location'].forEach(k => {
    const el = document.getElementById('mci-' + k);
    if (el) {
      el.value = _draft[k] || '';
      el.oninput = (e) => { _draft[k] = e.target.value; };
    }
  });

  // 시간 필드 자동 포맷팅 (HH:MM, 24시간제)
  ['departTime', 'arriveTime'].forEach(k => {
    const el = document.getElementById('mci-' + k);
    if (!el) return;
    el.oninput = (e) => {
      // 숫자만 추출
      let v = e.target.value.replace(/[^0-9]/g, '');
      if (v.length > 4) v = v.slice(0, 4);
      // HH:MM 형식으로 자동 포맷
      let formatted = v;
      if (v.length >= 3) {
        formatted = v.slice(0, 2) + ':' + v.slice(2);
      }
      e.target.value = formatted;
      _draft[k] = formatted;
    };
    el.onblur = (e) => {
      // 검증: HH:MM 형식, HH 0-23, MM 0-59
      const v = e.target.value;
      if (!v) return;
      const m = v.match(/^(\d{1,2}):?(\d{0,2})$/);
      if (!m) {
        e.target.value = '';
        _draft[k] = '';
        return;
      }
      const hh = parseInt(m[1] || '0', 10);
      const mm = parseInt(m[2] || '0', 10);
      if (hh > 23 || mm > 59) {
        alert('시간은 24시간제로 입력해주세요 (00:00 ~ 23:59)');
        e.target.value = '';
        _draft[k] = '';
        return;
      }
      const formatted = String(hh).padStart(2, '0') + ':' + String(mm).padStart(2, '0');
      e.target.value = formatted;
      _draft[k] = formatted;
    };
  });

  // 트리아지
  // 외부 모드의 .bg-slate-950/.border-slate-800 !important CSS가 인라인 스타일을 덮어쓰는 문제 방지 →
  // setProperty(..., 'important')로 인라인에도 !important 부여하여 선택 시각화 보장.
  document.querySelectorAll('.mci-triage-btn').forEach(btn => {
    if (btn.dataset.mciTriage === _draft.triage) {
      const color = btn.dataset.color;
      btn.style.setProperty('border-color', color, 'important');
      btn.style.setProperty('background-color', color + '33', 'important');  // 20% 투명도(33/255 ≈ 20%)
    }
    btn.onclick = () => {
      _draft.triage = btn.dataset.mciTriage;
      document.querySelectorAll('.mci-triage-btn').forEach(b => {
        b.style.removeProperty('border-color');
        b.style.removeProperty('background-color');
      });
      const color = btn.dataset.color;
      btn.style.setProperty('border-color', color, 'important');
      btn.style.setProperty('background-color', color + '33', 'important');
    };
  });

  // 성별
  document.querySelectorAll('.mci-gender-btn').forEach(btn => {
    if (btn.dataset.mciGender === _draft.gender) {
      btn.classList.remove('border-slate-800', 'bg-slate-950', 'text-slate-300');
      btn.classList.add('border-pink-500', 'bg-pink-950/30', 'text-white');
    }
    btn.onclick = () => {
      _draft.gender = btn.dataset.mciGender;
      document.querySelectorAll('.mci-gender-btn').forEach(b => {
        b.classList.remove('border-pink-500', 'bg-pink-950/30', 'text-white');
        b.classList.add('border-slate-800', 'bg-slate-950', 'text-slate-300');
      });
      btn.classList.remove('border-slate-800', 'bg-slate-950', 'text-slate-300');
      btn.classList.add('border-pink-500', 'bg-pink-950/30', 'text-white');
    };
  });

  // 미이송(자체귀가) 토글
  const ntBtn = document.getElementById('mci-not-transported-btn');
  if (ntBtn) {
    const ntOn = () => {
      ntBtn.classList.remove('border-slate-800', 'bg-slate-950', 'text-slate-300');
      ntBtn.classList.add('border-violet-500', 'bg-violet-950/30', 'text-violet-200');
    };
    const ntOff = () => {
      ntBtn.classList.remove('border-violet-500', 'bg-violet-950/30', 'text-violet-200');
      ntBtn.classList.add('border-slate-800', 'bg-slate-950', 'text-slate-300');
    };
    if (_draft.notTransported) ntOn();
    ntBtn.onclick = () => {
      _draft.notTransported = !_draft.notTransported;
      if (_draft.notTransported) ntOn(); else ntOff();
    };
  }

  // 소아 토글
  const pedBtn = document.getElementById('mci-pediatric-btn');
  if (pedBtn) {
    if (_draft.isPediatric) {
      pedBtn.classList.remove('border-slate-800', 'bg-slate-950', 'text-slate-300');
      pedBtn.classList.add('border-cyan-500', 'bg-cyan-950/30', 'text-cyan-200');
    }
    pedBtn.onclick = () => {
      _draft.isPediatric = !_draft.isPediatric;
      if (_draft.isPediatric) {
        pedBtn.classList.remove('border-slate-800', 'bg-slate-950', 'text-slate-300');
        pedBtn.classList.add('border-cyan-500', 'bg-cyan-950/30', 'text-cyan-200');
      } else {
        pedBtn.classList.remove('border-cyan-500', 'bg-cyan-950/30', 'text-cyan-200');
        pedBtn.classList.add('border-slate-800', 'bg-slate-950', 'text-slate-300');
      }
    };
  }

  // AVPU
  document.querySelectorAll('.mci-avpu-btn').forEach(btn => {
    if (btn.dataset.mciAvpu === _draft.consciousness) {
      btn.classList.remove('border-slate-800', 'bg-slate-950', 'text-slate-300');
      btn.classList.add('border-pink-500', 'bg-pink-950/30', 'text-white');
    }
    btn.onclick = () => {
      _draft.consciousness = btn.dataset.mciAvpu;
      document.querySelectorAll('.mci-avpu-btn').forEach(b => {
        b.classList.remove('border-pink-500', 'bg-pink-950/30', 'text-white');
        b.classList.add('border-slate-800', 'bg-slate-950', 'text-slate-300');
      });
      btn.classList.remove('border-slate-800', 'bg-slate-950', 'text-slate-300');
      btn.classList.add('border-pink-500', 'bg-pink-950/30', 'text-white');
    };
  });

  // 손상기전 (단일)
  document.querySelectorAll('.mci-mech-btn').forEach(btn => {
    if (btn.dataset.mciMech === _draft.mechanism) {
      btn.classList.remove('border-slate-800', 'bg-slate-950', 'text-slate-300');
      btn.classList.add('border-pink-500', 'bg-pink-950/30', 'text-white');
    }
    btn.onclick = () => {
      _draft.mechanism = btn.dataset.mciMech === _draft.mechanism ? '' : btn.dataset.mciMech;
      document.querySelectorAll('.mci-mech-btn').forEach(b => {
        b.classList.remove('border-pink-500', 'bg-pink-950/30', 'text-white');
        b.classList.add('border-slate-800', 'bg-slate-950', 'text-slate-300');
      });
      if (_draft.mechanism) {
        btn.classList.remove('border-slate-800', 'bg-slate-950', 'text-slate-300');
        btn.classList.add('border-pink-500', 'bg-pink-950/30', 'text-white');
      }
    };
  });

  // 손상부위 (다중)
  document.querySelectorAll('.mci-part-btn').forEach(btn => {
    if (_draft.injuryParts.includes(btn.dataset.mciPart)) {
      btn.classList.remove('border-slate-800', 'bg-slate-950', 'text-slate-300');
      btn.classList.add('border-pink-500', 'bg-pink-950/30', 'text-white');
    }
    btn.onclick = () => {
      const v = btn.dataset.mciPart;
      const idx = _draft.injuryParts.indexOf(v);
      if (idx >= 0) {
        _draft.injuryParts.splice(idx, 1);
        btn.classList.remove('border-pink-500', 'bg-pink-950/30', 'text-white');
        btn.classList.add('border-slate-800', 'bg-slate-950', 'text-slate-300');
      } else {
        _draft.injuryParts.push(v);
        btn.classList.remove('border-slate-800', 'bg-slate-950', 'text-slate-300');
        btn.classList.add('border-pink-500', 'bg-pink-950/30', 'text-white');
      }
    };
  });

  // 처치 (다중)
  document.querySelectorAll('.mci-tx-btn').forEach(btn => {
    if (_draft.treatments.includes(btn.dataset.mciTx)) {
      btn.classList.remove('border-slate-800', 'bg-slate-950', 'text-slate-300');
      btn.classList.add('border-emerald-500', 'bg-emerald-950/30', 'text-emerald-200');
    }
    btn.onclick = () => {
      const v = btn.dataset.mciTx;
      const idx = _draft.treatments.indexOf(v);
      if (idx >= 0) {
        _draft.treatments.splice(idx, 1);
        btn.classList.remove('border-emerald-500', 'bg-emerald-950/30', 'text-emerald-200');
        btn.classList.add('border-slate-800', 'bg-slate-950', 'text-slate-300');
      } else {
        _draft.treatments.push(v);
        btn.classList.remove('border-slate-800', 'bg-slate-950', 'text-slate-300');
        btn.classList.add('border-emerald-500', 'bg-emerald-950/30', 'text-emerald-200');
      }
    };
  });

  // 수정 취소
  const cancelBtn = document.getElementById('mci-cancel-edit');
  if (cancelBtn) {
    cancelBtn.onclick = () => { resetCurrentDraft(); render(); };
  }

  // 저장
  document.getElementById('mci-save-btn').onclick = async () => {
    if (!_draft.triage) { alert('트리아지를 먼저 선택하세요'); return; }
    const ok = await saveSelectedCasualty({
      name: (_draft.name || '').trim(),
      age: (_draft.age || '').trim(),
      gender: _draft.gender,
      isPediatric: _draft.isPediatric,
      location: (_draft.location || '').trim(),
      triage: _draft.triage,
      consciousness: _draft.consciousness,
      rr: _draft.rr, pulse: _draft.pulse,
      bpSys: _draft.bpSys, bpDia: _draft.bpDia, spo2: _draft.spo2,
      symptom: (_draft.symptom || '').trim(),
      mechanism: _draft.mechanism,
      injuryParts: _draft.injuryParts,
      treatments: _draft.treatments,
      drugs: (_draft.drugs || '').trim(),
      hospital: (_draft.hospital || '').trim(),
      departTime: _draft.departTime,
      arriveTime: _draft.arriveTime,
      notTransported: !!_draft.notTransported,
      notes: (_draft.notes || '').trim(),
    }, state.user.teamId, state.user.name, _draft._editKey);

    if (ok) {
      resetCurrentDraft();
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  };

  // 수정 진입
  document.querySelectorAll('.mci-edit-btn').forEach(btn => {
    btn.onclick = () => {
      const c = _dataList.find(x => x._key === btn.dataset.mciEdit);
      if (!c) return;
      // 권한 체크
      if (!canEditCard(state.user, c)) {
        alert('이 카드를 수정할 권한이 없습니다.');
        return;
      }
      mciDraft = {
        name: c.name || '', age: c.age || '', gender: c.gender || '',
        isPediatric: !!c.isPediatric,
        location: c.location || '',
        triage: c.triage || '',
        consciousness: c.consciousness || '',
        rr: c.rr || '', pulse: c.pulse || '',
        bpSys: c.bpSys || '', bpDia: c.bpDia || '', spo2: c.spo2 || '',
        symptom: c.symptom || '',
        mechanism: c.mechanism || '',
        injuryParts: Array.isArray(c.injuryParts) ? [...c.injuryParts] : [],
        treatments: Array.isArray(c.treatments) ? [...c.treatments] : [],
        drugs: c.drugs || '',
        hospital: c.hospital || '',
        departTime: c.departTime || '',
        arriveTime: c.arriveTime || '',
        notTransported: !!c.notTransported,
        notes: c.notes || '',
        _editKey: btn.dataset.mciEdit,
      };
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };
  });

  // 삭제
  document.querySelectorAll('.mci-del-btn').forEach(btn => {
    btn.onclick = async () => {
      const c = _dataList.find(x => x._key === btn.dataset.mciDel);
      if (c && !canEditCard(state.user, c)) {
        alert('이 카드를 삭제할 권한이 없습니다.');
        return;
      }
      if (!confirm('이 사상자 카드를 삭제하시겠습니까?')) return;
      await deleteSelectedCasualty(btn.dataset.mciDel);
    };
  });
}

// MCI 통합 상황판
function renderMciSituation() {
  // 트리아지별 합계
  const triageTotals = MCI_TRIAGE.map(tr => ({
    ...tr,
    count: state.mciCasualties.filter(c => c.triage === tr.id).length,
    pediatricCount: state.mciCasualties.filter(c => c.triage === tr.id && c.isPediatric).length,
  }));
  const totalCount = state.mciCasualties.length;

  // 이송 상태 분류 (notTransported는 우선 처리 — 미이송으로 빠짐)
  const notTransported = state.mciCasualties.filter(c => c.notTransported);
  const transported = state.mciCasualties.filter(c => c.hospital && !c.notTransported);
  const pending = state.mciCasualties.filter(c => !c.hospital && !c.notTransported && c.triage !== 'dead');
  const arrived = state.mciCasualties.filter(c => c.arriveTime && !c.notTransported);

  // 병원별 현황
  const hospitalMap = {};
  transported.forEach(c => {
    const h = c.hospital;
    if (!hospitalMap[h]) hospitalMap[h] = { total: 0, byTriage: {}, arrived: 0 };
    hospitalMap[h].total++;
    hospitalMap[h].byTriage[c.triage] = (hospitalMap[h].byTriage[c.triage] || 0) + 1;
    if (c.arriveTime) hospitalMap[h].arrived++;
  });
  const hospitals = Object.entries(hospitalMap).map(([name, d]) => ({ name, ...d }));

  return `
    <div class="px-4 py-4 space-y-4">

      <!-- 트리아지 합계 -->
      <section class="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden">
        <div class="px-4 py-3.5 bg-gradient-to-r from-pink-950/40 to-transparent border-b border-slate-800 flex items-center gap-2">
          <div class="w-1 h-6 bg-pink-500 rounded-full"></div>
          <h2 class="text-lg font-bold tracking-tight">트리아지 합계</h2>
          <span class="ml-auto text-xs text-slate-400">총 <span class="font-bold text-slate-200">${totalCount}</span>명</span>
        </div>
        <div class="grid grid-cols-4 gap-2 p-3">
          ${triageTotals.map(tr => {
            const isExpanded = state.expandedTriage === tr.id;
            return `
            <button data-triage-card="${tr.id}" class="triage-card-clickable rounded-xl px-2 py-4 text-center transition-all cursor-pointer hover:brightness-125"
              style="background:${tr.bg}50; border:1.5px solid ${tr.color}; ${isExpanded ? `outline:2px solid ${tr.color}; outline-offset:2px;` : ''}"
              title="${isExpanded ? '접기' : tr.name + ' 환자 목록 펼치기'}">
              <div class="text-xs sm:text-sm tracking-wider font-extrabold" style="color:${tr.color}">${tr.shortName}·${tr.name}</div>
              <div class="text-4xl sm:text-5xl font-black mono mt-1 leading-none" style="color:${tr.color}">${tr.count}</div>
              ${tr.pediatricCount > 0 ? `
                <div class="text-[11px] font-bold text-cyan-300 mt-1.5 flex items-center justify-center gap-0.5">
                  <i data-lucide="baby" class="w-3 h-3"></i>${tr.pediatricCount}
                </div>
              ` : ''}
            </button>
            `;
          }).join('')}
        </div>

        <!-- 트리아지 펼친 환자 목록 -->
        ${(() => {

                          : `<span class="text-slate-200">${escapeHtml(c.hospital || '-')}</span>`

                      <td class="px-2.5 py-2.5 text-center text-slate-300 mono text-xs">
                        ${c.departTime || '-'}<br>${c.arriveTime ? `<span class="text-emerald-400 font-bold">${c.arriveTime}</span>` : '-'}
                      </td>
                      <td class="px-2.5 py-2.5 text-slate-300 text-xs max-w-[90px] truncate">${displayAuthor}</td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        `}
      </section>
    </div>
  `;
}

// ==================== MCI 통합상황판 사상자 명단 → 행 클릭 이벤트 ====================
function bindMciSituationEvents() {
  // 사상자 명단 행 클릭 → 카드 상세 모달
  document.querySelectorAll('.mci-row-clickable').forEach(tr => {
    tr.onclick = () => {
      state.viewMciCardKey = tr.dataset.mciRow;
      render();
    };
  });

  // 병원별 이송 현황 — 병원 카드 클릭 → 환자 목록 토글
  document.querySelectorAll('.hospital-row-clickable').forEach(div => {
    div.onclick = () => {
      const name = div.dataset.hospitalRow;
      state.expandedHospital = (state.expandedHospital === name) ? null : name;
      render();
    };
  });

  // 병원별 이송 현황 — 환자 행 클릭 → 카드 상세 모달
  document.querySelectorAll('.hospital-patient-clickable').forEach(btn => {
    btn.onclick = (e) => {
      // 환자 버튼은 별도 컨테이너에 있으므로 부모 hospital-row로의 버블링은 발생하지 않지만,
      // 이후 마크업 변경 대비해 명시적으로 차단
      e.stopPropagation();
      state.viewMciCardKey = btn.dataset.hospitalPatient;
      render();
    };
  });

  // 트리아지 합계 — 트리아지 카드 클릭 → 환자 목록 토글 (이송 상태 펼침은 자동 닫음)
  document.querySelectorAll('.triage-card-clickable').forEach(btn => {
    btn.onclick = () => {
      const id = btn.dataset.triageCard;
      state.expandedTriage = (state.expandedTriage === id) ? null : id;
      state.expandedTransport = null;
      render();
    };
  });

  // 트리아지 합계 — 닫기 버튼
  const triageCollapseBtn = document.getElementById('triage-collapse-btn');
  if (triageCollapseBtn) {
    triageCollapseBtn.onclick = (e) => {
      e.stopPropagation();
      state.expandedTriage = null;
      render();
    };
  }

  // 트리아지 합계 — 환자 행 클릭 → 카드 상세 모달
  document.querySelectorAll('.triage-patient-clickable').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      state.viewMciCardKey = btn.dataset.triagePatient;
      render();
    };
  });

  // 이송 상태 (미배정/이송중/병원도착) — 카드 클릭 → 환자 목록 토글 (트리아지 펼침은 자동 닫음)
  document.querySelectorAll('.transport-card-clickable').forEach(btn => {
    btn.onclick = () => {
      const id = btn.dataset.transportCard;
      state.expandedTransport = (state.expandedTransport === id) ? null : id;
      state.expandedTriage = null;
      render();
    };
  });

  // 이송 상태 — 닫기 버튼
  const transportCollapseBtn = document.getElementById('transport-collapse-btn');
  if (transportCollapseBtn) {
    transportCollapseBtn.onclick = (e) => {
      e.stopPropagation();
      state.expandedTransport = null;
      render();
    };
  }

  // 이송 상태 — 환자 행 클릭 → 카드 상세 모달
  document.querySelectorAll('.transport-patient-clickable').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      state.viewMciCardKey = btn.dataset.transportPatient;
      render();
    };
  });
}

function bindMciCardDetailModalEvents() {
  const close = () => { state.viewMciCardKey = null; render(); };

  // 배경 클릭 → 닫기
  const bg = document.getElementById('mci-card-modal-bg');
  if (bg) {
    bg.onclick = (e) => { if (e.target.id === 'mci-card-modal-bg') close(); };
  }
  // X 버튼 + 하단 닫기 버튼
  document.querySelectorAll('[data-mci-card-modal-close]').forEach(b => { b.onclick = close; });

  // 수정 → 사상자 카드 탭으로 이동 + draft 로드
  const editBtn = document.getElementById('mci-card-modal-edit');
  if (editBtn) {
    editBtn.onclick = () => {
      const c = state.mciCasualties.find(x => x._key === state.viewMciCardKey);
      if (!c) { close(); return; }
      if (!canEditCard(state.user, c)) {
        alert('이 카드를 수정할 권한이 없습니다.');
        return;
      }
      mciDraft = {
        name: c.name || '', age: c.age || '', gender: c.gender || '',
        isPediatric: !!c.isPediatric,
        location: c.location || '',
        triage: c.triage || '',
        consciousness: c.consciousness || '',
        rr: c.rr || '', pulse: c.pulse || '',
        bpSys: c.bpSys || '', bpDia: c.bpDia || '', spo2: c.spo2 || '',
        symptom: c.symptom || '',
        mechanism: c.mechanism || '',
        injuryParts: Array.isArray(c.injuryParts) ? [...c.injuryParts] : [],
        treatments: Array.isArray(c.treatments) ? [...c.treatments] : [],
        drugs: c.drugs || '',
        hospital: c.hospital || '',
        departTime: c.departTime || '',
        arriveTime: c.arriveTime || '',
        notTransported: !!c.notTransported,
        notes: c.notes || '',
        _editKey: c._key,
      };
      state.viewMciCardKey = null;
      state.mciTab = 'casualty';
      state.mciInputMode = 'full';   // 풀 카드 입력 모드로 진입
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };
  }
}

// ==================== 외부(야외) 모드 ====================
// body에 .outdoor-mode 클래스가 있으면 라이트 고대비 테마로 전환됨 (CSS에서 처리).
// 토글 버튼은 HTML body 직속에 fixed 배치되어 모든 화면에서 항상 접근 가능.
function applyOutdoorMode() {
  document.body.classList.toggle('outdoor-mode', !!state.outdoorMode);
  const btn = document.getElementById('outdoor-toggle');
  if (btn) {
    const icon = btn.querySelector('i');
    if (icon) icon.setAttribute('data-lucide', state.outdoorMode ? 'moon' : 'sun');
    btn.title = state.outdoorMode
      ? '외부 모드 끄기 (어두운 모드로 전환)'
      : '외부 모드 켜기 (햇빛에서 시인성 강화)';
  }
  if (window.lucide) window.lucide.createIcons();
}

function initOutdoorToggle() {
  // localStorage에서 직전 설정 복원
  try { state.outdoorMode = localStorage.getItem('disaster_outdoor') === '1'; } catch {}
  applyOutdoorMode();
  const btn = document.getElementById('outdoor-toggle');
  if (btn) {
    btn.onclick = () => {
      state.outdoorMode = !state.outdoorMode;
      try { localStorage.setItem('disaster_outdoor', state.outdoorMode ? '1' : '0'); } catch {}
      applyOutdoorMode();
    };
  }
}

// ==================== 초기 부팅 ====================
function boot() {
  if (sessionStorage.getItem('disaster_authed') === '1') {
    state.authed = true;
  }
  const u = sessionStorage.getItem('disaster_user');
  if (u) {
    try {
      state.user = JSON.parse(u);
      if (state.user) state.mciInputMode = defaultInputMode(state.user.teamId);
    } catch {}
  }
  initOutdoorToggle();
  bindRealtime();
  render();
}

boot();
</script>

<!-- ==================== Service Worker 등록 ====================
     PWA 오프라인 캐싱 + "앱 설치" 알림. 같은 출처(HTTPS)에서만 작동.
     로컬 file:// 환경에서는 자동 비활성화됨.
================================================================ -->
<script>
  if ('serviceWorker' in navigator && location.protocol === 'https:') {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('[PWA] Service Worker 등록 완료:', reg.scope))
        .catch(err => console.warn('[PWA] Service Worker 등록 실패:', err));
    });
  }
</script>

<!-- ==================== "앱 설치" 배너 제어 ====================
     - Android Chrome/삼성인터넷 등: beforeinstallprompt 이벤트 받으면 배너 노출
     - iOS Safari: beforeinstallprompt 미지원 → 별도 안내 문구
     - 이미 설치(standalone) 상태 또는 사용자가 ✕로 닫은 적 있으면 노출 안 함
================================================================ -->
<script>
  (function () {
    let deferredInstallPrompt = null;
    const STORAGE_KEY = 'mci_install_dismissed';

    function $(id) { return document.getElementById(id); }

    // 이미 설치된 상태(standalone)인지 체크
    function isInstalled() {
      return window.matchMedia('(display-mode: standalone)').matches
          || window.navigator.standalone === true;
    }

    // 사용자가 이전에 ✕로 닫았는지
    function wasDismissed() {
      try { return localStorage.getItem(STORAGE_KEY) === '1'; } catch { return false; }
    }

    function showBanner() {
      const banner = $('install-banner');
      if (banner) {
        banner.style.display = 'flex';
        if (window.lucide) window.lucide.createIcons();
      }
    }

    function hideBanner() {
      const banner = $('install-banner');
      if (banner) banner.style.display = 'none';
    }

    // ── 1) Android/Chrome/삼성인터넷: beforeinstallprompt 처리 ──
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();              // 기본 미니 인포바 차단 → 우리 배너로 대체
      deferredInstallPrompt = e;
      if (isInstalled() || wasDismissed()) return;
      showBanner();
    });

    // 설치 완료 이벤트 → 배너 영구 숨김
    window.addEventListener('appinstalled', () => {
      hideBanner();
      deferredInstallPrompt = null;
      try { localStorage.setItem(STORAGE_KEY, '1'); } catch {}
      console.log('[PWA] 앱 설치 완료');
    });

    // ── 2) DOM 준비 후 버튼 이벤트 바인딩 + iOS Safari 별도 처리 ──
    function bindBannerEvents() {
      const installBtn  = $('install-btn');
      const dismissBtn  = $('install-dismiss');
      const desc        = $('install-banner-desc');

      if (installBtn) {
        installBtn.onclick = async () => {
          if (!deferredInstallPrompt) return;
          deferredInstallPrompt.prompt();
          try { await deferredInstallPrompt.userChoice; } catch {}
          deferredInstallPrompt = null;
          hideBanner();
        };
      }
      if (dismissBtn) {
        dismissBtn.onclick = () => {
          hideBanner();
          try { localStorage.setItem(STORAGE_KEY, '1'); } catch {}
        };
      }

      // iOS Safari 별도 안내 (beforeinstallprompt 미지원)
      const ua = navigator.userAgent;
      const isIOS = /iPhone|iPad|iPod/.test(ua);
      const isIOSSafari = isIOS && /Safari/.test(ua) && !/CriOS|FxiOS|EdgiOS/.test(ua);
      if (isIOSSafari && !isInstalled() && !wasDismissed()) {
        if (desc) desc.textContent = '하단 공유 ⬆️ → "홈 화면에 추가" 선택';
        if (installBtn) installBtn.style.display = 'none';
        showBanner();
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', bindBannerEvents);
    } else {
      bindBannerEvents();
    }
  })();
</script>

</body>
</html>
